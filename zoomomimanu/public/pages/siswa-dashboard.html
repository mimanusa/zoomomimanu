<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZooMimanu">
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    .konten { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

    /* Banner Hero */
    .banner-hero {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }
    .banner-hero::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(108,60,225,0.3) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .banner-hero::after {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,200,150,0.2) 0%, transparent 70%);
      bottom: -80px; left: 100px;
      pointer-events: none;
    }
    .avatar-siswa {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(108,60,225,0.4);
      position: relative;
      z-index: 1;
    }
    .banner-teks {
      position: relative;
      z-index: 1;
    }
    .banner-teks h2 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .banner-teks p { color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 600; }
    .badge-kelas {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(108,60,225,0.35);
      border: 1px solid rgba(108,60,225,0.5);
      color: #C4B5FD;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 8px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-kartu {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--bayangan);
      text-align: center;
    }
    .stat-kartu .stat-ikon { font-size: 28px; margin-bottom: 8px; }
    .stat-kartu .stat-angka {
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .stat-kartu .stat-label { font-size: 12px; color: var(--abu); font-weight: 700; }

    /* Masuk Kelas */
    .section-kartu {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--bayangan);
    }
    .section-kartu h3 {
      font-size: 16px;
      font-weight: 800;
      color: var(--teks);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .kode-input-row {
      display: flex;
      gap: 12px;
    }
    .kode-input-row .input-field { flex: 1; }

    .kartu-ruang-tersedia {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--abu-muda);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .kartu-ruang-tersedia:hover { border-color: var(--primary); background: var(--primary-light); }
    .kartu-ruang-tersedia .kode {
      font-size: 20px;
      font-weight: 900;
      font-family: monospace;
      color: var(--primary);
      letter-spacing: 0.04em;
    }
    .kartu-ruang-tersedia .detail { font-size: 12px; color: var(--abu); margin-top: 3px; font-weight: 700; }

    /* Tugas */
    .tugas-item {
      border: 2px solid #FEF3C7;
      background: #FFFBEB;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      transition: all 0.2s;
    }
    .tugas-item:hover { border-color: #FCD34D; }
    .tugas-item .tugas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .tugas-item h4 { font-size: 14px; font-weight: 800; color: #92400E; }
    .tugas-item .soal { font-size: 14px; color: var(--teks); margin-bottom: 14px; line-height: 1.6; font-weight: 600; }
    .area-jawaban { display: flex; gap: 10px; }
    .area-jawaban textarea {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #E2E8F0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      resize: vertical;
      outline: none;
      transition: all 0.2s;
      min-height: 80px;
    }
    .area-jawaban textarea:focus { border-color: var(--secondary); }
    .sudah-dijawab {
      background: var(--hijau-muda);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: #065F46;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .banner-hero { flex-direction: column; text-align: center; }
      .kode-input-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header-app">
    <div class="logo">
      <div class="logo-icon" style="background:none;padding:0;overflow:hidden;">
        <img src="/icons/icon-72x72.png" alt="Z" style="width:36px;height:36px;border-radius:9px;object-fit:cover;display:block;">
      </div>
      Zoo<span>Mimanu</span>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="info-user" id="info-header">Memuat...</span>
      <button class="btn btn-kecil btn-merah" onclick="keluar()">Keluar</button>
    </div>
  </div>

  <div class="konten">
    <!-- Banner Hero -->
    <div class="banner-hero">
      <div class="avatar-siswa">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="banner-teks">
        <h2 id="nama-siswa">Selamat Datang!</h2>
        <p>Siap untuk belajar hari ini?</p>
        <div class="badge-kelas">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          <span id="kelas-siswa-info">—</span>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-kartu">
        <div class="stat-ikon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1565FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div class="stat-angka" id="stat-ruang">0</div>
        <div class="stat-label">Ruang Aktif</div>
      </div>
      <div class="stat-kartu">
        <div class="stat-ikon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="stat-angka" id="stat-tugas">0</div>
        <div class="stat-label">Tugas Masuk</div>
      </div>
      <div class="stat-kartu">
        <div class="stat-ikon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="stat-angka" id="stat-selesai">0</div>
        <div class="stat-label">Tugas Selesai</div>
      </div>
    </div>

    <!-- Masuk dengan Kode -->
    <div class="section-kartu">
      <h3>
        <div class="section-icon" style="background:#DBEAFE;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1565FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg>
        </div>
        Masuk dengan Kode Ruang
      </h3>
      <div class="kode-input-row">
        <input type="text" id="kode-input" class="input-field"
          placeholder="Contoh: KELAS6-09KF"
          style="text-transform:uppercase; font-weight:800; font-family:monospace; font-size:16px; letter-spacing:0.05em;"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') masukDenganKode()" />
        <button class="btn btn-utama" onclick="masukDenganKode()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><path d="M6 12h12"/></svg>
          Masuk
        </button>
      </div>
    </div>

    <!-- Ruang Kelas Tersedia -->
    <div class="section-kartu">
      <h3>
        <div class="section-icon" style="background:#D1FAE5;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        Ruang Kelas Tersedia
        <button onclick="muatRuang()" style="margin-left:auto; background:none; border:none; cursor:pointer;" title="Refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>
      </h3>
      <div id="daftar-ruang-siswa">
        <div style="text-align:center; padding:20px; color:var(--abu); font-size:13px; font-weight:600;">Memuat ruang aktif...</div>
      </div>
    </div>

    <!-- Tugas dari Guru -->
    <div class="section-kartu" id="kartu-tugas" style="display:none;">
      <h3>
        <div class="section-icon" style="background:#FEF3C7;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        Tugas dari Guru
      </h3>
      <div id="daftar-tugas-siswa">
        <p style="color:var(--abu); font-size:13px; font-weight:600;">Belum ada tugas.</p>
      </div>
    </div>
  </div>

  <div id="notif" class="notif" style="display:none;"></div>

  <script>
    let penggunaSaatIni = null;
    const tugasDijawab = new Set();

    window.onload = function() {
      const data = localStorage.getItem('penggunaSaatIni');
      if (!data) return window.location.href = '/';
      penggunaSaatIni = JSON.parse(data);
      if (penggunaSaatIni.role !== 'siswa') return window.location.href = '/';

      document.getElementById('info-header').textContent = `${penggunaSaatIni.nama}`;
      document.getElementById('nama-siswa').textContent = `Halo, ${penggunaSaatIni.nama}!`;
      document.getElementById('kelas-siswa-info').textContent = penggunaSaatIni.kelas;

      muatRuang();
    };

    async function muatRuang() {
      const resp = await fetch(`/api/ruang/aktif/${penggunaSaatIni.kelas}`);
      const hasil = await resp.json();
      const container = document.getElementById('daftar-ruang-siswa');
      const ruangList = hasil.data || [];

      document.getElementById('stat-ruang').textContent = ruangList.length;

      if (ruangList.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:30px 20px; color:var(--abu);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div style="font-weight:700;">Belum ada ruang kelas aktif</div>
            <div style="font-size:12px; margin-top:6px;">Tunggu gurumu membuat ruang kelas</div>
          </div>`;
        return;
      }

      container.innerHTML = ruangList.map(r => `
        <div class="kartu-ruang-tersedia" onclick="masukRuang('${r.id}', '${r.kode}', '${r.judul}')">
          <div>
            <div class="kode">${r.kode}</div>
            <div class="detail">${r.judul} · ${r.namaGuru} · ${new Date(r.dibuatPada).toLocaleTimeString('id-ID')}</div>
          </div>
          <button class="btn btn-utama btn-kecil">Masuk →</button>
        </div>
      `).join('');
    }

    function masukDenganKode() {
      const kode = document.getElementById('kode-input').value.trim().toUpperCase();
      if (!kode) return tampilNotif('❌ Masukkan kode ruang!');
      masukRuangDenganKode(kode);
    }

    async function masukRuangDenganKode(kode) {
      const resp = await fetch(`/api/ruang/aktif/${penggunaSaatIni.kelas}`);
      const hasil = await resp.json();
      const ruang = (hasil.data || []).find(r => r.kode === kode);
      if (!ruang) return tampilNotif('❌ Kode ruang tidak ditemukan!');
      masukRuang(ruang.id, ruang.kode, ruang.judul);
    }

    function masukRuang(id, kode, judul) {
      localStorage.setItem('ruangSaatIni', JSON.stringify({ id, kode, judul }));
      window.open(`/ruang/${id}`, '_blank');
    }

    function tampilNotif(pesan) {
      const el = document.getElementById('notif');
      el.textContent = pesan;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function keluar() {
      localStorage.removeItem('penggunaSaatIni');
      window.location.href = '/';
    }

    setInterval(muatRuang, 15000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
  </script>
</body>
</html>
