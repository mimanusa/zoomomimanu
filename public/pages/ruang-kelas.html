<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Ruang ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ZooMimanu">
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0f172a; }

    /* ---- HEADER ---- */
    .header-ruang {
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #334155;
    }
    .header-ruang .kiri { display: flex; align-items: center; gap: 12px; }
    .header-ruang .kode-ruang { font-family: monospace; font-size: 16px; font-weight: 700; color: #60a5fa; }
    .header-ruang .status-live {
      background: #ef4444; color: white; padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700; animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ---- AREA UTAMA ---- */
    .area-utama { display: flex; flex: 1; overflow: hidden; }

    /* ---- VIDEO AREA ---- */
    .area-video { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Tab navigasi */
    .tab-nav { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
    .tab-nav button {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-nav button.aktif { color: #60a5fa; border-bottom-color: #60a5fa; }

    /* Panel konten */
    .panel { display: none; flex: 1; overflow: hidden; }
    .panel.tampil { display: flex; }

    /* ---- PANEL VIDEO ---- */
    #panel-video { flex-direction: column; background: #0f172a; }
    .grid-video {
      flex: 1; display: grid; gap: 8px; padding: 12px;
      overflow-y: auto; align-content: center;
      grid-template-columns: repeat(2, 1fr);
    }
    .grid-video.peserta-1 { grid-template-columns: 1fr; max-width: 720px; margin: 0 auto; width: 100%; }
    .grid-video.peserta-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-video.peserta-3, .grid-video.peserta-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-video.peserta-5, .grid-video.peserta-6 { grid-template-columns: repeat(3, 1fr); }
    .grid-video.peserta-banyak { grid-template-columns: repeat(4, 1fr); }

    .kotak-video {
      position: relative; background: #1e293b;
      border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; width: 100%;
    }
    .kotak-video video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .kotak-video .label-nama {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white; padding: 16px 10px 8px; font-size: 13px; font-weight: 600;
    }
    .kotak-video .avatar-besar {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; font-size: 56px; background: #334155;
    }

    /* Kontrol video bawah */
    .kontrol-video {
      background: #1e293b; padding: 12px 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 12px; border-top: 1px solid #334155;
    }
    .btn-kontrol {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      cursor: pointer; font-size: 18px; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-kontrol.aktif { background: #3b82f6; color: white; }
    .btn-kontrol.nonaktif { background: #ef4444; color: white; }
    .btn-kontrol.merah { background: #ef4444; color: white; }
    .btn-kontrol.abu { background: #334155; color: white; }

    /* ---- PANEL PRESENTASI ---- */
    #panel-papan { background: #111827; flex-direction: column; }

    /* Toolbar presentasi (guru only) */
    .toolbar-presentasi {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-wrap: nowrap;
      align-items: center;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      min-height: 0;
      max-height: 44px;
    }
    .toolbar-presentasi::-webkit-scrollbar { display: none; }
    .toolbar-presentasi > * { flex-shrink: 0; }

    /* Info siswa saat presentasi berlangsung */
    .info-siswa-presentasi {
      display: none;
      padding: 5px 12px;
      background: #1e3a5f;
      border-bottom: 1px solid #334155;
      font-size: 12px;
      color: #93c5fd;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      min-height: 0;
      max-height: 36px;
      overflow: hidden;
    }

    /* Placeholder kosong presentasi */
    .presentasi-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #475569;
    }
    .presentasi-placeholder svg { opacity: 0.3; }
    .presentasi-placeholder p { font-size: 15px; margin: 0; }

    /* Wrapper canvas presentasi */
    #papan-zoom-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #0f172a;
      display: none; /* ditampilkan saat ada presentasi */
      cursor: default;
    }
    #papan-zoom-wrapper.mode-pensil { cursor: crosshair; }
    #papan-zoom-inner {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    #papan-canvas { display: block; background: #1e293b; }
    #papan-draw-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      display: block;
    }
    #papan-zoom-wrapper.mode-pensil #papan-draw-canvas { pointer-events: auto; }

    /* Pensil toolbar */
    .toolbar-pensil {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; background: #0f2040;
      border: 1px solid #334155; border-radius: 8px;
    }
    .toolbar-pensil label { font-size: 11px; color: #94a3b8; }
    .toolbar-pensil input[type=color] {
      width: 26px; height: 26px; border: none; border-radius: 5px;
      cursor: pointer; padding: 1px; background: transparent;
    }
    .toolbar-pensil input[type=range] { width: 60px; accent-color: #3b82f6; }
    .btn-pensil-aktif { background: #7c3aed !important; color: white !important; }

    /* Navigasi halaman presentasi */
    .nav-halaman {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-halaman.tampil { display: flex; }
    .nav-halaman .info-file {
      font-size: 12px; color: #94a3b8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 200px;
    }
    .nav-halaman .teks-halaman { font-size: 13px; color: #e2e8f0; font-weight: 700; min-width: 48px; text-align: center; }

    /* ---- PANEL TUGAS ---- */
    #panel-tugas { flex-direction: column; background: #0f172a; overflow: hidden; }
    .tugas-scroll { flex: 1; overflow-y: auto; padding: 16px; }

    /* Form buat tugas (guru) */
    .form-buat-tugas {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .form-buat-tugas h3 {
      color: #60a5fa; font-size: 14px; font-weight: 700;
      margin: 0 0 14px; display: flex; align-items: center; gap: 7px;
    }
    .form-buat-tugas input,
    .form-buat-tugas textarea {
      width: 100%; padding: 9px 12px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      margin-bottom: 10px; outline: none; transition: border 0.2s;
    }
    .form-buat-tugas input:focus,
    .form-buat-tugas textarea:focus { border-color: #3b82f6; }
    .form-buat-tugas textarea { resize: vertical; min-height: 70px; }
    .form-buat-tugas input::placeholder,
    .form-buat-tugas textarea::placeholder { color: #475569; }
    .btn-kirim-tugas {
      background: #3b82f6; color: white; border: none;
      border-radius: 8px; padding: 9px 20px; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-kirim-tugas:hover { background: #2563eb; }
    .btn-kirim-tugas:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* Kartu tugas */
    .kartu-tugas {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }
    .kartu-tugas .judul-tugas { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; }
    .kartu-tugas .meta-tugas { font-size: 11px; color: #64748b; margin-bottom: 10px; }
    .kartu-tugas .soal-tugas {
      background: #1a2540; border: 1px solid #2d4a7a;
      border-radius: 8px; padding: 12px; font-size: 14px;
      color: #bfdbfe; margin-bottom: 12px; line-height: 1.5;
    }
    .kartu-tugas textarea {
      width: 100%; padding: 9px 12px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      resize: vertical; min-height: 72px; outline: none;
      transition: border 0.2s; margin-bottom: 8px;
    }
    .kartu-tugas textarea:focus { border-color: #3b82f6; }
    .sudah-dijawab {
      background: #052e16; border: 1px solid #166534;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #4ade80;
    }
    .btn-kirim-jawaban {
      background: #16a34a; color: white; border: none;
      border-radius: 8px; padding: 8px 18px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-kirim-jawaban:hover { background: #15803d; }

    /* ---- FLOATING CHAT BUTTON ---- */
    #btn-toggle-chat {
      position: fixed; bottom: 20px; right: 20px; z-index: 500;
      height: 48px; padding: 0 16px;
      border-radius: 24px;
      background: #3b82f6; border: none; color: white; font-size: 13px;
      font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 20px rgba(59,130,246,0.5);
      display: flex; align-items: center; gap: 8px;
      transition: background 0.2s, transform 0.15s;
      user-select: none;
    }
    #btn-toggle-chat:hover { background: #2563eb; transform: scale(1.05); }
    #btn-toggle-chat svg { flex-shrink: 0; }

    /* ---- FLOATING CHAT PANEL ---- */
    .sidebar-chat {
      position: fixed; bottom: 80px; right: 20px;
      width: 300px; height: 420px; background: #1e293b;
      display: flex; flex-direction: column;
      border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      border: 1px solid #334155; z-index: 499;
      transition: opacity 0.2s, transform 0.2s; overflow: hidden;
    }
    .sidebar-chat.tersembunyi { opacity: 0; pointer-events: none; transform: translateY(12px) scale(0.97); }
    .sidebar-chat h4 {
      padding: 12px 16px; color: white; font-size: 13px;
      border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .sidebar-chat h4 button { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; }

    .daftar-peserta-chat {
      padding: 8px 14px; border-bottom: 1px solid #334155;
      max-height: 90px; overflow-y: auto; flex-shrink: 0;
    }
    .item-peserta { display: flex; align-items: center; gap: 6px; color: #94a3b8; font-size: 12px; padding: 2px 0; }
    .item-peserta .dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
    .item-peserta .guru-tag { color: #60a5fa; font-weight: 700; }

    .area-pesan-chat {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 7px; min-height: 0;
    }
    .buble-chat { background: #334155; border-radius: 8px; padding: 7px 10px; font-size: 12px; }
    .buble-chat .pengirim { font-weight: 700; margin-bottom: 2px; }
    .buble-chat .pengirim.guru { color: #60a5fa; }
    .buble-chat .pengirim.siswa { color: #4ade80; }
    .buble-chat .isi { color: #e2e8f0; }
    .buble-chat .wkt { font-size: 10px; color: #64748b; margin-top: 3px; }

    .input-chat-area { padding: 8px 10px; border-top: 1px solid #334155; display: flex; gap: 6px; flex-shrink: 0; }
    .input-chat-area input {
      flex: 1; background: #334155; border: none; border-radius: 8px;
      padding: 7px 11px; color: white; font-size: 13px;
    }
    .input-chat-area input::placeholder { color: #64748b; }
    .input-chat-area input:focus { outline: 1px solid #60a5fa; }
    .input-chat-area button {
      background: #3b82f6; border: none; border-radius: 8px;
      padding: 7px 12px; color: white; cursor: pointer; font-size: 16px;
    }

    /* ---- DIALOG CUSTOM ---- */
    .dialog-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .dialog-box {
      background: #1e293b; border-radius: 14px; padding: 24px 28px;
      color: white; max-width: 320px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #334155;
    }
    .dialog-box p { margin: 0 0 20px; font-size: 15px; line-height: 1.5; }
    .dialog-box .dialog-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .dialog-box .dialog-btns button {
      padding: 8px 18px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .dialog-box .dialog-btns .btn-batal { background: #334155; color: #94a3b8; }
    .dialog-box .dialog-btns .btn-ok { background: #ef4444; color: white; }

    /* Notifikasi */
    .notif-tangan {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: #f59e0b; color: #451a03;
      padding: 10px 20px; border-radius: 100px;
      font-weight: 700; font-size: 14px; display: none; z-index: 100;
    }

    /* Badge chat unread */
    #badge-chat-unread {
      position: absolute; top: -6px; right: -6px;
      background: #ef4444; color: white; border-radius: 50%;
      font-size: 10px; font-weight: 700; width: 18px; height: 18px;
      display: none; align-items: center; justify-content: center;
      border: 2px solid #0f172a;
    }

    /* Umum btn kecil */
    .btn-sm {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 9px; border-radius: 6px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-sm.abu { background: #334155; color: #cbd5e1; }
    .btn-sm.abu:hover { background: #475569; }
    .btn-sm.merah { background: #ef4444; color: white; }
    .btn-sm.merah:hover { background: #dc2626; }
    .btn-sm.ungu { background: #7c3aed; color: white; }
    .btn-sm.ungu:hover { background: #6d28d9; }

    /* ---- MOBILE ---- */
    @media (max-width: 640px) {
      .area-utama { flex-direction: column; }
      .area-video { flex: 1; }
      .grid-video { padding: 6px; gap: 6px; }
      .kontrol-video { padding: 8px 12px; gap: 8px; }
      .btn-kontrol { width: 40px; height: 40px; font-size: 15px; }
      .sidebar-chat { width: calc(100vw - 32px); right: 16px; }
      #btn-toggle-chat { bottom: 12px; right: 12px; padding: 0 12px; height: 42px; font-size: 12px; }
      .tab-nav button { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header-ruang">
  <div class="kiri">
    <span style="display:flex;align-items:center;gap:8px;">
      <img src="/icons/icon-72x72.png" alt="Z" style="width:28px;height:28px;border-radius:7px;object-fit:cover;">
      ZooMimanu
    </span>
    <span class="kode-ruang" id="kode-ruang-header">-</span>
    <span class="status-live">● LIVE</span>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <span style="color:#94a3b8; font-size:13px;" id="nama-saya-header">-</span>
    <button class="btn btn-kecil btn-merah" onclick="keluarRuang()">Keluar</button>
  </div>
</div>

<!-- Area Utama -->
<div class="area-utama">
  <div class="area-video">

    <!-- Tab -->
    <div class="tab-nav">
      <button class="aktif" onclick="gantiPanel('video', this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Video Call
      </button>
      <button onclick="gantiPanel('papan', this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Presentasi
        <span id="badge-presentasi" style="display:none; background:#7c3aed; color:white; border-radius:50%; padding:1px 6px; font-size:11px;">●</span>
      </button>
      <button onclick="gantiPanel('tugas', this)" id="tab-tugas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Tugas
        <span id="badge-tugas" style="display:none; background:#ef4444; color:white; border-radius:50%; padding:1px 6px; font-size:11px;">!</span>
      </button>
    </div>

    <!-- ==================== PANEL VIDEO ==================== -->
    <div class="panel tampil" id="panel-video">
      <div class="grid-video" id="grid-video">
        <div class="kotak-video" id="kotak-video-lokal">
          <video id="video-lokal" autoplay muted playsinline></video>
          <div class="avatar-besar" id="avatar-lokal" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="label-nama" id="label-saya">Anda</div>
        </div>
      </div>
      <div class="kontrol-video">
        <button class="btn-kontrol aktif" id="btn-mic" onclick="toggleMic()" title="Mikrofon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="btn-kontrol aktif" id="btn-cam" onclick="toggleCam()" title="Kamera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
        <button class="btn-kontrol abu" onclick="angkatTangan()" title="Angkat Tangan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 00-4 0v5"/><path d="M14 10V4a2 2 0 00-4 0v2"/><path d="M10 10.5V6a2 2 0 00-4 0v8"/><path d="M18 8a2 2 0 114 0v6a8 8 0 01-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 012.83-2.82L8 15"/></svg>
        </button>
        <button class="btn-kontrol merah" onclick="keluarRuang()" title="Keluar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- ==================== PANEL PRESENTASI ==================== -->
    <div class="panel" id="panel-papan">

      <!-- Toolbar guru -->

<script src="/socket.io/socket.io.js"></script>
<script>
// =====================================================
// INISIALISASI
// =====================================================
let penggunaSaatIni = null;
let ruangSaatIni = null;
let socket = null;
let streamLokal = null;
let mikAktif = true;
let camAktif = true;

const koneksiPeer = {};
const streamPeer = {};

window.onload = async function() {
  const dataUser = localStorage.getItem('penggunaSaatIni');
  const dataRuang = localStorage.getItem('ruangSaatIni');

  if (!dataUser || !dataRuang) {
    alert('Session habis. Silakan login kembali.');
    window.location.href = '/';
    return;
  }

  penggunaSaatIni = JSON.parse(dataUser);
  ruangSaatIni = JSON.parse(dataRuang);

  const namaDisplay = penggunaSaatIni.namaGuru || penggunaSaatIni.nama;

  document.getElementById('kode-ruang-header').textContent = ruangSaatIni.kode;
  document.getElementById('nama-saya-header').textContent = namaDisplay;
  document.getElementById('label-saya').textContent = `${namaDisplay} (Anda)`;
  document.getElementById('nama-sendiri-list').textContent =
    `${namaDisplay} (Anda) ` + (penggunaSaatIni.role === 'guru' ? '👩‍🏫' : '🎒');

  if (penggunaSaatIni.role === 'guru') {
    // Guru: tampilkan toolbar presentasi & form tugas
    document.getElementById('toolbar-presentasi-guru').style.display = 'flex';
    document.getElementById('form-buat-tugas').style.display = 'block';
    // Update placeholder
    document.getElementById('placeholder-teks').textContent = 'Belum ada presentasi';
    document.getElementById('placeholder-sub').textContent = 'Buka file untuk memulai presentasi';
  } else {
    // Siswa: tampilkan info presentasi siswa
    document.getElementById('info-siswa-presentasi').style.display = 'flex';
  }

  await mulaiMedia();
  hubungkanSocket();
  setupZoom();
};

// =====================================================
// MEDIA (KAMERA & MIC)
// =====================================================
async function mulaiMedia() {
  try {
    streamLokal = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    const vLokal = document.getElementById('video-lokal');
    vLokal.srcObject = streamLokal;
    vLokal.muted = true; // local always muted (no echo)
    vLokal.play().catch(() => {});
    document.getElementById('avatar-lokal').style.display = 'none';
  } catch (err) {
    document.getElementById('avatar-lokal').style.display = 'flex';
    document.getElementById('video-lokal').style.display = 'none';
    try { streamLokal = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); } catch(e) {}
  }
}

function toggleMic() {
  mikAktif = !mikAktif;
  if (streamLokal) streamLokal.getAudioTracks().forEach(t => t.enabled = mikAktif);
  const btn = document.getElementById('btn-mic');
  btn.innerHTML = mikAktif
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/><path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
  btn.className = `btn-kontrol ${mikAktif ? 'aktif' : 'nonaktif'}`;
  socket.emit('toggle-audio', { ruangId: ruangSaatIni.id, status: mikAktif });
}

function toggleCam() {
  camAktif = !camAktif;
  if (streamLokal) streamLokal.getVideoTracks().forEach(t => t.enabled = camAktif);
  const btn = document.getElementById('btn-cam');
  btn.innerHTML = camAktif
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 01-2-2V8a2 2 0 012-2h3m3-3h6l2 3h4a2 2 0 012 2v9.34m-7.72-2.06a4 4 0 11-5.56-5.56"/></svg>`;
  btn.className = `btn-kontrol ${camAktif ? 'aktif' : 'nonaktif'}`;
  socket.emit('toggle-video', { ruangId: ruangSaatIni.id, status: camAktif });
}

// =====================================================
// SOCKET.IO
// =====================================================
function hubungkanSocket() {
  socket = io({
    ackTimeout: 15000,
    retries: 3,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });

  // ---- CONNECT: selalu emit bergabung-ruang di sini ----
  // Ini menangani BOTH koneksi pertama DAN reconnect
  let sudahBergabung = false;
  socket.on('connect', () => {
    console.log('[Socket connect] id:', socket.id, 'sudahBergabung:', sudahBergabung);
    
    // Kalau ini reconnect (sudah bergabung sebelumnya), bersihkan peer lama
    if (sudahBergabung) {
      Object.keys(koneksiPeer).forEach(sid => {
        try { koneksiPeer[sid].close(); } catch(e) {}
        hapusVideoRemote(sid);
        delete koneksiPeer[sid];
      });
    }
    sudahBergabung = true;
    
    const namaUser = penggunaSaatIni.namaGuru || penggunaSaatIni.nama;
    socket.emit('bergabung-ruang', {
      ruangId: ruangSaatIni.id,
      userId: penggunaSaatIni.id,
      namaUser,
      role: penggunaSaatIni.role
    });
    console.log('[bergabung-ruang dikirim]', ruangSaatIni.id);
  });

  // ATURAN OFFER:
  // - GURU selalu yang kirim offer ke semua
  // - SISWA tidak pernah kirim offer, hanya terima dan jawab
  // Ini mencegah "offer collision" di mana keduanya kirim offer bersamaan

  socket.on('daftar-pengguna-online', (daftar) => {
    daftar.forEach(pengguna => {
      if (pengguna.socketId !== socket.id) {
        tambahPeserta(pengguna.socketId, pengguna.namaUser, pengguna.role);
        // Hanya guru yang kirim offer ke semua yang sudah ada
        if (penggunaSaatIni.role === 'guru') {
          const existing = koneksiPeer[pengguna.socketId];
          if (existing && existing.connectionState === 'connected') return;
          setTimeout(() => mulaiWebRTC(pengguna.socketId, true), 500);
        }
        // Siswa tidak kirim offer — tunggu offer dari guru
      }
    });
  });

  socket.on('pengguna-bergabung', ({ socketId, namaUser, role }) => {
    tambahPeserta(socketId, namaUser, role);
    tambahPesanChat('sistem', `${namaUser} bergabung ke ruangan`, '');
    // Guru kirim offer ke siswa yang baru masuk
    if (penggunaSaatIni.role === 'guru') {
      setTimeout(() => mulaiWebRTC(socketId, true), 500);
    }
    // Kalau guru yang baru masuk, siswa yang sudah ada kirim offer ke guru
    if (penggunaSaatIni.role === 'siswa' && role === 'guru') {
      setTimeout(() => mulaiWebRTC(socketId, true), 500);
    }
  });

  socket.on('pengguna-keluar', ({ socketId, namaUser }) => {
    hapusPeserta(socketId, namaUser);
    hapusVideoRemote(socketId);
    if (koneksiPeer[socketId]) { koneksiPeer[socketId].close(); delete koneksiPeer[socketId]; }
  });

  // WebRTC signaling
  socket.on('webrtc-offer', async ({ dariSocketId, offer }) => {
    console.log('Terima offer dari', dariSocketId);
    await terimaOffer(dariSocketId, offer);
  });

  socket.on('webrtc-answer', async ({ dariSocketId, answer }) => {
    console.log('[Answer ←]', dariSocketId);
    const pc = koneksiPeer[dariSocketId];
    if (!pc) return;
    if (pc.signalingState !== 'have-local-offer') {
      console.warn('[Answer diabaikan] signalingState:', pc.signalingState);
      return;
    }
    try {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      await flushIce(dariSocketId, pc);
    } catch(e) { console.error('[answer gagal]', e); }
  });

  socket.on('webrtc-ice-candidate', async ({ dariSocketId, candidate }) => {
    if (!candidate) return;
    const pc = koneksiPeer[dariSocketId];
    if (!pc) return;
    if (pc.remoteDescription && pc.remoteDescription.type) {
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(_) {}
    } else {
      if (!iceBuffer[dariSocketId]) iceBuffer[dariSocketId] = [];
      iceBuffer[dariSocketId].push(candidate);
    }
  });

  // Chat
  socket.on('pesan-chat', ({ namaUser, pesan, role, waktu }) => {
    tambahPesanChat(namaUser, pesan, role, waktu);
  });

  // Presentasi (diterima siswa & guru lain)
  // Simpan slide terakhir untuk digambar ulang saat tab dibuka
  let slideAktif = null;

  socket.on('presentasi-halaman', ({ imageData, halaman, totalHalaman, namaFile }) => {
    slideAktif = { imageData, halaman, totalHalaman, namaFile };

    document.getElementById('badge-presentasi').style.display = 'inline';
    if (document.getElementById('teks-info-siswa')) {
      document.getElementById('teks-info-siswa').textContent =
        `📄 ${namaFile || 'Presentasi'} — Halaman ${halaman}/${totalHalaman}`;
    }
    tampilNotif(`📄 ${namaFile || 'Presentasi'} — ${halaman}/${totalHalaman}`);

    // Buka tab presentasi dan gambar
    const tabPapan = document.querySelector('.tab-nav button:nth-child(2)');
    if (tabPapan) gantiPanel('papan', tabPapan);

    tampilkanCanvasPresentasi(true);
    // Gambar setelah canvas visible dan layout stabil
    setTimeout(() => {
      gambarKeCanvas(imageData);
      // Gambar ulang sekali lagi untuk pastikan tidak tertimpa resize
      setTimeout(() => gambarKeCanvas(imageData), 300);
    }, 200);
  });

  socket.on('presentasi-selesai', () => {
    const canvas = document.getElementById('papan-canvas');
    if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    tampilkanCanvasPresentasi(false);
    document.getElementById('badge-presentasi').style.display = 'none';
    document.getElementById('teks-info-siswa').textContent = 'Presentasi sedang berlangsung';
    tampilNotif('✅ Presentasi selesai');
  });

  // Tugas
  socket.on('tugas-baru', (tugas) => {
    tampilTugasBaru(tugas);
    document.getElementById('badge-tugas').style.display = 'inline';
  });

  // Angkat tangan
  socket.on('siswa-angkat-tangan', ({ namaUser }) => {
    if (penggunaSaatIni.role === 'guru') {
      const el = document.getElementById('notif-tangan');
      el.textContent = `✋ ${namaUser} angkat tangan!`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }
  });

  // disconnect / error handlers

  socket.on('disconnect', (reason) => {
    console.warn('Socket disconnect:', reason);
    // Jangan tampilkan notif jika ini adalah disconnect yang disengaja
    if (reason !== 'io client disconnect') {
      tampilNotif('⚠️ Koneksi terputus, mencoba kembali...');
    }
  });

  socket.on('connect_error', (err) => {
    console.warn('Socket connect_error:', err.message);
  });
}

// =====================================================
// WebRTC
// =====================================================
async function ambilWebRTCConfig() {
  // Jangan cache — selalu fetch fresh supaya TURN credentials selalu valid
  try {
    const resp = await fetch('/api/webrtc-config');
    const cfg = await resp.json();
    console.log('[WebRTC] ICE servers:', JSON.stringify(cfg.iceServers));
    return cfg;
  } catch(e) {
    console.warn('[WebRTC] Gagal fetch config, pakai STUN saja');
    return { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]};
  }
}

// Buffer ICE candidates yang datang sebelum setRemoteDescription
const iceBuffer = {};      // buffer ICE sebelum remoteDescription siap
const sedangNegosiasiDg = {}; // cegah double offer ke socket yang sama

async function buatPC(socketId) {
  const config = await ambilWebRTCConfig();
  const pc = new RTCPeerConnection(config);
  koneksiPeer[socketId] = pc;
  iceBuffer[socketId] = [];

  // Tambah semua track lokal
  if (streamLokal) {
    streamLokal.getTracks().forEach(t => pc.addTrack(t, streamLokal));
  }

  // Kumpulkan semua track remote dalam satu stream
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => {
    console.log('[ontrack]', socketId, e.track.kind, e.track.readyState);
    if (!remoteStream.getTrackById(e.track.id)) {
      remoteStream.addTrack(e.track);
    }
    tampilVideoRemote(socketId, remoteStream);
    e.track.onunmute = () => tampilVideoRemote(socketId, remoteStream);
    e.track.onended  = () => console.log('[track ended]', socketId, e.track.kind);
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('webrtc-ice-candidate', { tujuanSocketId: socketId, candidate: e.candidate });
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log('[ICE]', socketId, pc.iceConnectionState);
    if (pc.iceConnectionState === 'failed' && pc.restartIce) pc.restartIce();
  };

  pc.onconnectionstatechange = () => {
    console.log('[PC]', socketId, pc.connectionState);
    if (pc.connectionState === 'connected') {
      delete sedangNegosiasiDg[socketId]; // negosiasi selesai
    }
    if (pc.connectionState === 'failed') {
      if (pc.restartIce) { pc.restartIce(); return; }
      hapusVideoRemote(socketId);
      if (koneksiPeer[socketId] === pc) delete koneksiPeer[socketId];
    }
    if (pc.connectionState === 'disconnected') {
      setTimeout(() => {
        if (koneksiPeer[socketId] === pc &&
           (pc.connectionState === 'disconnected' || pc.connectionState === 'failed')) {
          hapusVideoRemote(socketId);
          delete koneksiPeer[socketId];
        }
      }, 6000);
    }
  };

  return pc;
}

async function flushIce(socketId, pc) {
  const buf = iceBuffer[socketId] || [];
  iceBuffer[socketId] = [];
  for (const c of buf) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(_) {}
  }
}

async function mulaiWebRTC(targetSocketId, kirimOffer) {
  // Jangan mulai negosiasi baru kalau sedang negosiasi / sudah connected
  const existing = koneksiPeer[targetSocketId];
  if (existing) {
    if (existing.connectionState === 'connected') return;
    if (sedangNegosiasiDg[targetSocketId]) return;
    try { existing.close(); } catch(_) {}
    hapusVideoRemote(targetSocketId);
    delete koneksiPeer[targetSocketId];
  }

  sedangNegosiasiDg[targetSocketId] = true;
  const pc = await buatPC(targetSocketId);

  if (kirimOffer) {
    try {
      const offer = await pc.createOffer({
        offerToReceiveAudio: true,
        offerToReceiveVideo: true
      });
      await pc.setLocalDescription(offer);
      socket.emit('webrtc-offer', { tujuanSocketId: targetSocketId, offer });
      console.log('[Offer →]', targetSocketId);
    } catch(e) {
      console.error('[offer gagal]', e);
      delete sedangNegosiasiDg[targetSocketId];
    }
  }
}

async function terimaOffer(dariSocketId, offer) {
  const existing = koneksiPeer[dariSocketId];
  if (existing) {
    try { existing.close(); } catch(_) {}
    hapusVideoRemote(dariSocketId);
    delete koneksiPeer[dariSocketId];
  }

  sedangNegosiasiDg[dariSocketId] = true;
  const pc = await buatPC(dariSocketId);

  try {
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    await flushIce(dariSocketId, pc);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('webrtc-answer', { tujuanSocketId: dariSocketId, answer });
    console.log('[Answer →]', dariSocketId);
  } catch(e) {
    console.error('[terimaOffer gagal]', e);
    delete sedangNegosiasiDg[dariSocketId];
  }
}

function tampilVideoRemote(socketId, stream) {
  // Kalau sudah ada, update srcObject dan coba play ulang
  const existing = document.getElementById(`video-${socketId}`);
  if (existing) {
    const v = existing.querySelector('video');
    if (v) {
      v.srcObject = stream;
      v.play().catch(() => {
        v.muted = true;
        v.play().then(() => setTimeout(() => { v.muted = false; }, 1000)).catch(() => {});
      });
    }
    return;
  }

  const div = document.createElement('div');
  div.className = 'kotak-video';
  div.id = `video-${socketId}`;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsinline = true;
  video.muted = false;
  video.srcObject = stream;

  // Play dengan fallback muted (untuk autoplay policy browser)
  function cobaPlay() {
    video.play().catch(() => {
      video.muted = true;
      video.play().then(() => {
        setTimeout(() => { video.muted = false; }, 1000);
      }).catch(e => console.warn('[play gagal]', e));
    });
  }

  video.onloadedmetadata = () => { cobaPlay(); };
  setTimeout(cobaPlay, 200);

  const label = document.createElement('div');
  label.className = 'label-nama';
  const peserta = document.querySelector(`[data-socket="${socketId}"]`);
  label.textContent = peserta ? peserta.dataset.nama : 'Peserta';

  const indikator = document.createElement('div');
  indikator.style.cssText = 'position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;';

  div.appendChild(video);
  div.appendChild(indikator);
  div.appendChild(label);
  document.getElementById('grid-video').appendChild(div);
  updateGridVideo();
}

function hapusVideoRemote(socketId) {
  const el = document.getElementById(`video-${socketId}`);
  if (el) {
    if (el._checkInterval) clearInterval(el._checkInterval);
    el.remove();
  }
  updateGridVideo();
}

function updateGridVideo() {
  const grid = document.getElementById('grid-video');
  const jumlah = grid.querySelectorAll('.kotak-video').length;
  grid.className = 'grid-video';
  if (jumlah === 1) grid.classList.add('peserta-1');
  else if (jumlah === 2) grid.classList.add('peserta-2');
  else if (jumlah === 3) grid.classList.add('peserta-3');
  else if (jumlah === 4) grid.classList.add('peserta-4');
  else if (jumlah === 5) grid.classList.add('peserta-5');
  else if (jumlah === 6) grid.classList.add('peserta-6');
  else grid.classList.add('peserta-banyak');
}

// =====================================================
// ZOOM PRESENTASI (FIXED - gambar tidak lari)
// =====================================================
let zoomLevel = 1.0;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;
let pinchJarak = null;

function setupZoom() {
  const wrapper = document.getElementById('papan-zoom-wrapper');
  if (!wrapper) return;

  // ---- PINCH ZOOM (mobile) ----
  wrapper.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      pinchJarak = jarakDuaJari(e.touches);
      e.preventDefault();
    } else if (e.touches.length === 1 && !modePensil) {
      isPanning = true;
      panStartX = e.touches[0].clientX - panX;
      panStartY = e.touches[0].clientY - panY;
    }
  }, { passive: false });

  wrapper.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && pinchJarak !== null) {
      e.preventDefault();
      const jarakBaru = jarakDuaJari(e.touches);
      const ratio = jarakBaru / pinchJarak;
      const rect = wrapper.getBoundingClientRect();
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      zoomKePusat(zoomLevel * ratio, midX, midY);
      pinchJarak = jarakBaru;
    } else if (e.touches.length === 1 && isPanning && !modePensil) {
      e.preventDefault();
      panX = e.touches[0].clientX - panStartX;
      panY = e.touches[0].clientY - panStartY;
      terapkanTransformasi();
    }
  }, { passive: false });

  wrapper.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) pinchJarak = null;
    if (e.touches.length === 0) isPanning = false;
  }, { passive: true });

  // ---- DOUBLE TAP DUA JARI = UNDO ----
  let lastTwoFingerTap = 0;
  wrapper.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const now = Date.now();
      if (now - lastTwoFingerTap < 350) {
        undoDraw();
        e.preventDefault();
      }
      lastTwoFingerTap = now;
    }
  }, { passive: false });

  // ---- CTRL+SCROLL (desktop) ----
  wrapper.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const rect = wrapper.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const delta = e.deltaY < 0 ? 0.15 : -0.15;
      zoomKePusat(zoomLevel + delta, cx, cy);
    }
  }, { passive: false });

  // ---- DRAG PAN (desktop, bukan mode pensil) ----
  wrapper.addEventListener('mousedown', (e) => {
    if (!modePensil && e.button === 0) {
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      wrapper.style.cursor = 'grabbing';
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove', (e) => {
    if (isPanning && !modePensil) {
      panX = e.clientX - panStartX;
      panY = e.clientY - panStartY;
      terapkanTransformasi();
    }
  });
  document.addEventListener('mouseup', () => {
    if (isPanning) {
      isPanning = false;
      if (!modePensil) document.getElementById('papan-zoom-wrapper').style.cursor = 'grab';
    }
  });

  // ---- KEYBOARD UNDO/REDO ----
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoDraw(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redoDraw(); }
  });
}

function zoomKePusat(targetZoom, cx, cy) {
  const sebelum = zoomLevel;
  zoomLevel = Math.min(5, Math.max(0.2, targetZoom));
  if (zoomLevel === sebelum) return;
  // Jaga titik tengah layar tetap sama
  const ratio = zoomLevel / sebelum;
  panX = cx - (cx - panX) * ratio;
  panY = cy - (cy - panY) * ratio;
  terapkanTransformasi();
}

function zoomPapan(delta) {
  const wrapper = document.getElementById('papan-zoom-wrapper');
  if (!wrapper) return;
  const cx = wrapper.clientWidth / 2;
  const cy = wrapper.clientHeight / 2;
  zoomKePusat(zoomLevel + delta, cx, cy);
}

function resetZoomPapan() {
  const wrapper = document.getElementById('papan-zoom-wrapper');
  const canvas = document.getElementById('papan-canvas');
  if (!wrapper || !canvas) { zoomLevel = 1; panX = 0; panY = 0; terapkanTransformasi(); return; }
  // Fit canvas ke wrapper
  const scaleX = wrapper.clientWidth / canvas.width;
  const scaleY = wrapper.clientHeight / canvas.height;
  zoomLevel = Math.min(scaleX, scaleY, 1);
  panX = (wrapper.clientWidth - canvas.width * zoomLevel) / 2;
  panY = (wrapper.clientHeight - canvas.height * zoomLevel) / 2;
  terapkanTransformasi();
}

function terapkanTransformasi() {
  const inner = document.getElementById('papan-zoom-inner');
  if (inner) inner.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  const persen = Math.round(zoomLevel * 100) + '%';
  ['label-zoom', 'label-zoom-siswa'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = persen;
  });
}

function jarakDuaJari(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// PENSIL / ANNOTASI
// =====================================================
let modePensil = false;
let sedangMenggambar = false;
let undoStack = [];
let redoStack = [];
let strokeSaatIni = null;

function togglePensil() {
  modePensil = !modePensil;
  const btn = document.getElementById('btn-pensil');
  const wrapper = document.getElementById('papan-zoom-wrapper');
  const setting = document.getElementById('toolbar-pensil-setting');
  const btnHapus = document.getElementById('btn-hapus-draw');
  const btnUndo = document.getElementById('btn-undo');
  const btnRedo = document.getElementById('btn-redo');
  if (modePensil) {
    btn.classList.add('btn-pensil-aktif');
    btn.textContent = '✏️ Pensil ON';
    wrapper.classList.add('mode-pensil');
    wrapper.style.cursor = 'crosshair';
    setting.style.display = 'flex';
    btnHapus.style.display = 'inline-flex';
    btnUndo.style.display = 'inline-flex';
    btnRedo.style.display = 'inline-flex';
    setupPensil();
  } else {
    btn.classList.remove('btn-pensil-aktif');
    btn.textContent = '✏️ Pensil';
    wrapper.classList.remove('mode-pensil');
    wrapper.style.cursor = 'grab';
    setting.style.display = 'none';
    btnHapus.style.display = 'none';
    btnUndo.style.display = 'none';
    btnRedo.style.display = 'none';
  }
}

function setupPensil() {
  const dc = document.getElementById('papan-draw-canvas');
  if (dc._pensilSetup) return;
  dc._pensilSetup = true;

  function getPosCanvas(e) {
    const rect = dc.getBoundingClientRect();
    const scaleX = dc.width / rect.width;
    const scaleY = dc.height / rect.height;
    let cx, cy;
    if (e.touches) {
      cx = (e.touches[0].clientX - rect.left) * scaleX;
      cy = (e.touches[0].clientY - rect.top) * scaleY;
    } else {
      cx = (e.clientX - rect.left) * scaleX;
      cy = (e.clientY - rect.top) * scaleY;
    }
    return { x: cx, y: cy };
  }

  function mulaiGambar(e) {
    if (!modePensil) return;
    sedangMenggambar = true;
    const pos = getPosCanvas(e);
    strokeSaatIni = {
      warna: document.getElementById('warna-pensil').value,
      ukuran: parseInt(document.getElementById('ukuran-pensil').value),
      titik: [pos]
    };
    redoStack = [];
    e.preventDefault();
  }

  function gerakGambar(e) {
    if (!modePensil || !sedangMenggambar || !strokeSaatIni) return;
    const pos = getPosCanvas(e);
    strokeSaatIni.titik.push(pos);
    renderDrawCanvas();
    e.preventDefault();
  }

  function selesaiGambar(e) {
    if (!sedangMenggambar || !strokeSaatIni) return;
    sedangMenggambar = false;
    if (strokeSaatIni.titik.length > 1) {
      undoStack.push(strokeSaatIni);
    }
    strokeSaatIni = null;
  }

  dc.addEventListener('mousedown', mulaiGambar);
  dc.addEventListener('mousemove', gerakGambar);
  dc.addEventListener('mouseup', selesaiGambar);
  dc.addEventListener('mouseleave', selesaiGambar);
  dc.addEventListener('touchstart', mulaiGambar, { passive: false });
  dc.addEventListener('touchmove', gerakGambar, { passive: false });
  dc.addEventListener('touchend', selesaiGambar);

  // Update ukuran label
  document.getElementById('ukuran-pensil').addEventListener('input', function() {
    document.getElementById('label-ukuran-pensil').textContent = this.value + 'px';
  });
}

function renderDrawCanvas() {
  const dc = document.getElementById('papan-draw-canvas');
  const ctx = dc.getContext('2d');
  ctx.clearRect(0, 0, dc.width, dc.height);

  const semuaStroke = [...undoStack];
  if (strokeSaatIni) semuaStroke.push(strokeSaatIni);

  semuaStroke.forEach(s => {
    if (!s.titik || s.titik.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = s.warna;
    ctx.lineWidth = s.ukuran;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.moveTo(s.titik[0].x, s.titik[0].y);
    for (let i = 1; i < s.titik.length; i++) ctx.lineTo(s.titik[i].x, s.titik[i].y);
    ctx.stroke();
  });
}

function undoDraw() {
  if (undoStack.length === 0) return;
  redoStack.push(undoStack.pop());
  renderDrawCanvas();
  tampilNotif('↩️ Undo');
}

function redoDraw() {
  if (redoStack.length === 0) return;
  undoStack.push(redoStack.pop());
  renderDrawCanvas();
  tampilNotif('↪️ Redo');
}

function hapusSemuaCoretan() {
  if (undoStack.length === 0) return;
  redoStack = [...undoStack, ...redoStack];
  undoStack = [];
  renderDrawCanvas();
  tampilNotif('🧹 Coretan dihapus');
}

function gambarKeCanvas(imageData) {
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    if (canvas.width < 100) { canvas.width = 1280; canvas.height = 720; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const x = (canvas.width - img.width * scale) / 2;
    const y = (canvas.height - img.height * scale) / 2;
    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
  };
  img.src = imageData;
}

async function muatPDF(file) {
  if (!window.pdfjsLib) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const offscreen = document.createElement('canvas');
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.4 }); // Turunkan dari 1.8 agar ukuran file kecil
    offscreen.width = viewport.width;
    offscreen.height = viewport.height;
    await page.render({ canvasContext: offscreen.getContext('2d'), viewport }).promise;
    pages.push(offscreen.toDataURL('image/jpeg', 0.80)); // Turunkan kualitas agar ukuran kecil
  }
  return pages;
}

async function muatGambar(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve([e.target.result]);
    reader.readAsDataURL(file);
  });
}

function buatPlaceholderFile(namaFile, label) {
  const offscreen = document.createElement('canvas');
  offscreen.width = 1280; offscreen.height = 720;
  const c = offscreen.getContext('2d');
  // Background gelap
  c.fillStyle = '#0f172a'; c.fillRect(0, 0, 1280, 720);
  // Strip warna atas
  c.fillStyle = '#3b82f6'; c.fillRect(0, 0, 1280, 6);
  // Kotak ikon
  c.fillStyle = '#1e3a5f';
  roundRect(c, 440, 160, 400, 300, 24);
  c.fill();
  // Tipe file
  const ext = namaFile.split('.').pop().toUpperCase();
  c.fillStyle = '#60a5fa';
  c.font = 'bold 72px sans-serif';
  c.textAlign = 'center';
  c.fillText(ext, 640, 340);
  // Nama file
  c.fillStyle = '#e2e8f0';
  c.font = 'bold 28px sans-serif';
  c.fillText(namaFile.length > 50 ? namaFile.slice(0, 47) + '...' : namaFile, 640, 510);
  // Keterangan
  c.fillStyle = '#64748b';
  c.font = '20px sans-serif';
  c.fillText(label, 640, 560);
  return offscreen.toDataURL('image/jpeg', 0.9);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Render Office file via iframe (Google Docs Viewer) lalu screenshot ke canvas
async function muatOfficeFile(file) {
  return new Promise((resolve) => {
    // Upload file ke object URL
    const url = URL.createObjectURL(file);
    const viewerUrl = `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;

    // Buat iframe tersembunyi untuk render
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1280px;height:720px;opacity:0;pointer-events:none;';
    iframe.src = viewerUrl;
    document.body.appendChild(iframe);

    // Timeout: jika Google Viewer gagal, gunakan placeholder informatif
    const timeout = setTimeout(() => {
      iframe.remove();
      URL.revokeObjectURL(url);
      // Buat halaman informatif dengan info file
      resolve([buatPlaceholderOffice(file.name)]);
    }, 12000);

    iframe.onload = () => {
      clearTimeout(timeout);
      setTimeout(() => {
        try {
          // Capture via html2canvas jika tersedia
          if (window.html2canvas) {
            html2canvas(iframe.contentDocument.body, { width: 1280, height: 720, scale: 1 }).then(c => {
              const data = c.toDataURL('image/jpeg', 0.9);
              iframe.remove();
              URL.revokeObjectURL(url);
              resolve([data]);
            }).catch(() => {
              iframe.remove();
              URL.revokeObjectURL(url);
              resolve([buatPlaceholderOffice(file.name)]);
            });
          } else {
            iframe.remove();
            URL.revokeObjectURL(url);
            resolve([buatPlaceholderOffice(file.name)]);
          }
        } catch(e) {
          iframe.remove();
          URL.revokeObjectURL(url);
          resolve([buatPlaceholderOffice(file.name)]);
        }
      }, 2000);
    };
    iframe.onerror = () => {
      clearTimeout(timeout);
      iframe.remove();
      URL.revokeObjectURL(url);
      resolve([buatPlaceholderOffice(file.name)]);
    };
  });
}

function buatPlaceholderOffice(namaFile) {
  const offscreen = document.createElement('canvas');
  offscreen.width = 1280; offscreen.height = 720;
  const c = offscreen.getContext('2d');

  // Background
  c.fillStyle = '#0f172a'; c.fillRect(0, 0, 1280, 720);
  c.fillStyle = '#1e40af'; c.fillRect(0, 0, 1280, 6);

  // Kotak utama
  c.fillStyle = '#1e293b';
  roundRect(c, 340, 140, 600, 380, 20); c.fill();

  // Ikon file
  const ext = namaFile.split('.').pop().toUpperCase();
  const warna = ext.includes('DOC') ? '#3b82f6' : ext.includes('PPT') ? '#f97316' : '#8b5cf6';
  c.fillStyle = warna;
  c.font = 'bold 80px sans-serif';
  c.textAlign = 'center';
  c.fillText(ext, 640, 310);

  // Nama file
  c.fillStyle = '#e2e8f0';
  c.font = 'bold 24px sans-serif';
  const namaDisplay = namaFile.length > 55 ? namaFile.slice(0,52) + '...' : namaFile;
  c.fillText(namaDisplay, 640, 380);

  // Keterangan
  c.fillStyle = '#f59e0b';
  c.font = 'bold 18px sans-serif';
  c.fillText('⚠️ File Office tidak bisa ditampilkan langsung', 640, 430);

  c.fillStyle = '#94a3b8';
  c.font = '16px sans-serif';
  c.fillText('Solusi: Simpan sebagai PDF terlebih dahulu, lalu upload PDF-nya', 640, 468);
  c.fillText('File: ' + namaFile + ' — sudah diterima guru', 640, 500);

  return offscreen.toDataURL('image/jpeg', 0.9);
}

async function muatPresentasi(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  halamanPresentasi = [];
  halamanSaatIni = 0;
  namaFilePresentasi = file.name;

  // Tampilkan canvas dengan loading
  tampilkanCanvasPresentasi(true);
  const canvas = document.getElementById('papan-canvas');
  if (canvas.width < 100) { canvas.width = 1280; canvas.height = 720; }
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⏳ Memuat ' + file.name + ' ...', canvas.width / 2, canvas.height / 2);

  try {
    const tipe = file.type;
    const nama = file.name.toLowerCase();

    if (tipe === 'application/pdf' || nama.endsWith('.pdf')) {
      halamanPresentasi = await muatPDF(file);

    } else if (tipe.startsWith('image/') || nama.match(/\.(png|jpg|jpeg|gif|webp|bmp|svg)$/)) {
      halamanPresentasi = await muatGambar(file);

    } else if (nama.match(/\.(ppt|pptx|doc|docx|odt|odp)$/)) {
      // Konversi Office via Google Docs Viewer — render ke canvas
      halamanPresentasi = await muatOfficeFile(file);

    } else {
      halamanPresentasi = [buatPlaceholderFile(file.name, 'File sedang dipresentasikan')];
    }

    if (halamanPresentasi.length === 0) {
      tampilNotif('❌ Gagal memuat file'); return;
    }

    // Tampilkan kontrol navigasi guru
    const navGuru = document.getElementById('kontrol-nav-guru');
    navGuru.style.display = 'flex';
    document.getElementById('nama-file-aktif').textContent = file.name;
    tampilHalamanPresentasi(0);

  } catch(err) {
    console.error(err);
    tampilNotif('❌ Gagal memuat: ' + err.message);
  }
}

// Kompres imageData ke ukuran kecil sebelum dikirim via socket
// agar tidak menyebabkan socket timeout / user disconnect
function kompresUntukSocket(imageData) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const offscreen = document.createElement('canvas');
      // Batasi max 960x540 untuk socket
      const MAX_W = 960, MAX_H = 540;
      const ratio = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
      offscreen.width  = Math.round(img.width  * ratio);
      offscreen.height = Math.round(img.height * ratio);
      offscreen.getContext('2d').drawImage(img, 0, 0, offscreen.width, offscreen.height);
      // JPEG kualitas 0.65
      resolve(offscreen.toDataURL('image/jpeg', 0.65));
    };
    img.onerror = () => resolve(imageData);
    img.src = imageData;
  });
}

let _emiSedangBerjalan = false;
async function tampilHalamanPresentasi(idx) {
  if (idx < 0 || idx >= halamanPresentasi.length) return;
  halamanSaatIni = idx;
  const imageData = halamanPresentasi[idx];

  // Tampilkan lokal dulu (full resolusi)
  gambarKeCanvas(imageData);
  document.getElementById('teks-halaman').textContent = (idx + 1) + '/' + halamanPresentasi.length;

  // Hindari emit ganda yang tumpuk
  if (_emiSedangBerjalan) return;
  _emiSedangBerjalan = true;

  try {
    const imageKecil = await kompresUntukSocket(imageData);
    // Gunakan ack timeout agar socket tidak crash jika server lambat
    socket.timeout(8000).emit('presentasi-halaman', {
      ruangId: ruangSaatIni.id,
      imageData: imageKecil,
      halaman: idx + 1,
      totalHalaman: halamanPresentasi.length,
      namaFile: namaFilePresentasi
    }, (err) => {
      if (err) console.warn('Emit presentasi timeout (aman):', err.message);
    });
  } catch(e) {
    console.warn('Gagal kompres/emit presentasi:', e);
  } finally {
    setTimeout(() => { _emiSedangBerjalan = false; }, 300);
  }
}

function navigasiHalaman(arah) { tampilHalamanPresentasi(halamanSaatIni + arah); }

function akhiriPresentasi() {
  halamanPresentasi = [];
  halamanSaatIni = 0;
  document.getElementById('kontrol-nav-guru').style.display = 'none';
  tampilkanCanvasPresentasi(false);
  socket.emit('presentasi-selesai', { ruangId: ruangSaatIni.id });
}

// Guru membuat tugas dari dalam ruang
async function buatTugas() {
  const judul = document.getElementById('input-judul-tugas').value.trim();
  const soal = document.getElementById('input-soal-tugas').value.trim();
  if (!judul) { tampilNotif('❗ Judul tugas tidak boleh kosong'); return; }
  if (!soal)  { tampilNotif('❗ Soal tidak boleh kosong'); return; }

  const btn = document.getElementById('btn-kirim-tugas');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';

  try {
    const resp = await fetch('/api/tugas/buat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ruangId: ruangSaatIni.id,
        guruId: penggunaSaatIni.id,
        namaGuru: penggunaSaatIni.namaGuru || penggunaSaatIni.nama,
        judul,
        soal
      })
    });
    const hasil = await resp.json();
    if (hasil.sukses) {
      // Tampilkan langsung di panel guru juga
      tampilTugasBaru(hasil.tugas);
      document.getElementById('input-judul-tugas').value = '';
      document.getElementById('input-soal-tugas').value = '';
      tampilNotif('✅ Tugas berhasil dikirim ke siswa');
    } else {
      tampilNotif('❌ Gagal mengirim tugas');
    }
  } catch(e) {
    // Fallback: emit via socket jika API tidak tersedia
    const tugas = {
      id: Date.now().toString(),
      judul, soal,
      namaGuru: penggunaSaatIni.namaGuru || penggunaSaatIni.nama,
      dibuatPada: new Date().toISOString()
    };
    socket.emit('kirim-tugas', { ruangId: ruangSaatIni.id, tugas });
    tampilTugasBaru(tugas);
    document.getElementById('input-judul-tugas').value = '';
    document.getElementById('input-soal-tugas').value = '';
    tampilNotif('✅ Tugas dikirim ke siswa');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Kirim ke Siswa`;
}

function tampilTugasBaru(tugas) {
  const container = document.getElementById('konten-tugas');
  if (document.getElementById(`tugas-${tugas.id}`)) return;

  // Hapus placeholder
  const ph = document.getElementById('placeholder-tugas');
  if (ph) ph.style.display = 'none';

  const sudahDijawab = localStorage.getItem(`jawab-${tugas.id}`);
  const div = document.createElement('div');
  div.className = 'kartu-tugas';
  div.id = `tugas-${tugas.id}`;

  let isiJawaban = '';
  if (penggunaSaatIni.role === 'siswa') {
    if (sudahDijawab) {
      isiJawaban = `<div class="sudah-dijawab">✅ Jawabanmu: <em>${sudahDijawab}</em></div>`;
    } else {
      isiJawaban = `
        <textarea id="jawaban-${tugas.id}" placeholder="Tulis jawabanmu di sini..."></textarea>
        <button class="btn-kirim-jawaban" onclick="kirimJawaban('${tugas.id}')">✅ Kirim Jawaban</button>`;
    }
  } else {
    isiJawaban = `<p style="font-size:12px;color:#475569;margin:0;">Menunggu jawaban siswa...</p>`;
  }

  div.innerHTML = `
    <div class="judul-tugas">📝 ${tugas.judul}</div>
    <div class="meta-tugas">Dari: ${tugas.namaGuru} • ${new Date(tugas.dibuatPada).toLocaleTimeString('id-ID')}</div>
    <div class="soal-tugas">❓ ${tugas.soal}</div>
    ${isiJawaban}
  `;
  container.appendChild(div);
}

async function kirimJawaban(tugasId) {
  const jawaban = document.getElementById(`jawaban-${tugasId}`).value.trim();
  if (!jawaban) { tampilNotif('❗ Jawaban tidak boleh kosong'); return; }

  const resp = await fetch('/api/tugas/jawab', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tugasId,
      siswaId: penggunaSaatIni.id,
      namaSiswa: penggunaSaatIni.nama,
      jawaban
    })
  });

  const hasil = await resp.json();
  if (hasil.sukses) {
    localStorage.setItem(`jawab-${tugasId}`, jawaban);
    const div = document.getElementById(`tugas-${tugasId}`);
    const area = div.querySelector('textarea');
    const btn = div.querySelector('.btn-kirim-jawaban');
    if (area) area.replaceWith(Object.assign(document.createElement('div'), {
      className: 'sudah-dijawab',
      innerHTML: `✅ Jawaban terkirim: <em>${jawaban}</em>`
    }));
    if (btn) btn.remove();
    tampilNotif('✅ Jawaban terkirim!');
  }
}

// =====================================================
// NAVIGASI & DIALOG
// =====================================================
function tampilNotif(pesan) {
  const el = document.getElementById('notif-tangan');
  el.textContent = pesan;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3500);
}

function gantiPanel(nama, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('tampil'));
  document.getElementById(`panel-${nama}`).classList.add('tampil');
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('aktif'));
  el.classList.add('aktif');
  // Gambar ulang slide presentasi saat tab presentasi dibuka
  if (nama === 'papan' && typeof slideAktif !== 'undefined' && slideAktif) {
    setTimeout(() => gambarKeCanvas(slideAktif.imageData), 100);
  }
  if (nama === 'tugas') document.getElementById('badge-tugas').style.display = 'none';
}

function keluarRuang() {
  dialogKonfirmasi('Yakin ingin keluar dari ruang kelas?', () => {
    if (streamLokal) streamLokal.getTracks().forEach(t => t.stop());
    window.location.href = penggunaSaatIni.role === 'guru' ? '/guru' : '/siswa';
  });
}

function dialogKonfirmasi(pesan, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog-box">
      <p>${pesan}</p>
      <div class="dialog-btns">
        <button class="btn-batal" id="dlg-batal">Batal</button>
        <button class="btn-ok" id="dlg-ok">Ya, Lanjutkan</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#dlg-batal').onclick = () => overlay.remove();
  overlay.querySelector('#dlg-ok').onclick = () => { overlay.remove(); onOk(); };
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
