<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruang ZooMimanu - Unified</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; background: #0f172a; color: white; font-family: sans-serif; 
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* HEADER */
    .header {
      background: #1e293b; padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #334155; height: 60px;
    }

    /* MAIN CONTENT */
    .kontainer {
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      flex: 1;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    /* VIDEO CALL SECTION */
    .panel-video {
      background: #000; border-radius: 12px; overflow: hidden;
      display: flex; flex-direction: column; border: 1px solid #334155;
    }
    #area-video { flex: 1; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .kontrol-video {
      padding: 10px; background: #1e293b; display: flex; justify-content: center; gap: 10px;
    }

    /* WHITEBOARD SECTION */
    .panel-papan {
      background: #ffffff; border-radius: 12px; display: flex; flex-direction: column;
      overflow: hidden; border: 1px solid #334155;
    }
    .toolbar-papan {
      background: #f1f5f9; padding: 10px; border-bottom: 1px solid #cbd5e1;
      display: flex; gap: 10px; align-items: center; color: #334155;
    }
    #papan { flex: 1; cursor: crosshair; }

    /* TASK & CHAT SECTION */
    .panel-tugas {
      display: flex; flex-direction: column; gap: 10px;
    }
    .card-tugas {
      background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155;
    }
    .card-tugas textarea {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: white; padding: 10px; margin-top: 10px; resize: none;
    }
    .btn-kirim {
      width: 100%; margin-top: 10px; padding: 10px; border: none;
      border-radius: 8px; background: #22c55e; color: white; font-weight: bold; cursor: pointer;
    }

    @media (max-width: 1000px) {
      .kontainer { grid-template-columns: 1fr; overflow-y: auto; }
      .panel-video, .panel-papan { height: 350px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div style="font-weight: bold; font-size: 1.2rem;">ZooMimanu <span style="color: #6366f1;">Live</span></div>
    <div id="status">🔴 Sesi Berlangsung</div>
    <button onclick="keluar()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">Keluar</button>
  </div>

  <div class="kontainer">
    
    <div class="panel-video">
      <div id="area-video">
        <video id="vid-lokal" autoplay muted playsinline></video>
      </div>
      <div class="kontrol-video">
        <button onclick="micToggle()">🎤</button>
        <button onclick="camToggle()">📷</button>
      </div>
    </div>

    <div class="panel-papan">
      <div class="toolbar-papan">
        <input type="color" id="pen-color">
        <button onclick="bersihkan()">🧹 Hapus Semua</button>
        <span style="font-size: 12px; font-weight: bold;">Papan Tulis Guru</span>
      </div>
      <canvas id="papan"></canvas>
    </div>

    <div class="panel-tugas">
      <div class="card-tugas">
        <h4 style="margin: 0;">📋 Beri Tugas</h4>
        <textarea id="input-tugas" rows="4" placeholder="Ketik tugas di sini..."></textarea>
        <button class="btn-kirim" onclick="kirimTugas()">Kirim ke Siswa</button>
      </div>

      <div class="card-tugas" style="flex: 1; overflow-y: auto;">
        <h4 style="margin: 0;">📩 Jawaban Siswa</h4>
        <div id="rekap-jawaban" style="font-size: 13px; color: #94a3b8; margin-top: 15px; text-align: center;">
          Menunggu jawaban siswa...
        </div>
      </div>
    </div>

  </div>

  <script>
    // VIDEO CALL LOGIC
    let stream;
    async function initVideo() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('vid-lokal').srcObject = stream;
      } catch (err) {
        console.log("Kamera tidak aktif:", err);
      }
    }
    initVideo();

    function micToggle() { stream.getAudioTracks()[0].enabled = !stream.getAudioTracks()[0].enabled; }
    function camToggle() { stream.getVideoTracks()[0].enabled = !stream.getVideoTracks()[0].enabled; }

    // WHITEBOARD LOGIC
    const canvas = document.getElementById('papan');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resize() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
      if (!drawing) return;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.strokeStyle = document.getElementById('pen-color').value;
      
      const rect = canvas.getBoundingClientRect();
      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function bersihkan() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // TUGAS LOGIC
    function kirimTugas() {
      const tugas = document.getElementById('input-tugas').value;
      if(!tugas) return alert("Silakan isi tugas!");
      alert("Tugas terkirim!");
      document.getElementById('input-tugas').value = "";
    }

    function keluar() {
      if (confirm("Ingin keluar dari kelas?")) {
        if (stream) stream.getTracks().forEach(track => track.stop());
        window.location.href = '/guru-dashboard.html';
      }
    }
  </script>
</body>
</html>
