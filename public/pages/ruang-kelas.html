<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Ruang ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ZooMimanu">
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0f172a; }

    /* ---- HEADER ---- */
    .header-ruang {
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #334155;
    }
    .header-ruang .kiri { display: flex; align-items: center; gap: 12px; }
    .header-ruang .kode-ruang { font-family: monospace; font-size: 16px; font-weight: 700; color: #60a5fa; }
    .header-ruang .status-live { 
      background: #ef4444; color: white; padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700; animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ---- AREA UTAMA ---- */
    .area-utama {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- VIDEO AREA ---- */
    .area-video {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tab navigasi */
    .tab-nav {
      display: flex;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .tab-nav button {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-nav button.aktif { color: #60a5fa; border-bottom-color: #60a5fa; }

    /* Panel konten */
    .panel { display: none; flex: 1; overflow: hidden; }
    .panel.tampil { display: flex; }

    /* ---- PANEL VIDEO ---- */
    #panel-video { flex-direction: column; background: #0f172a; }
    .grid-video {
      flex: 1;
      display: grid;
      gap: 8px;
      padding: 12px;
      overflow-y: auto;
      align-content: center;
      grid-template-columns: repeat(2, 1fr);
    }
    /* 1 peserta - full width */
    .grid-video.peserta-1 { grid-template-columns: 1fr; max-width: 720px; margin: 0 auto; width: 100%; }
    /* 2 peserta - 2 kolom */
    .grid-video.peserta-2 { grid-template-columns: repeat(2, 1fr); }
    /* 3-4 peserta - 2 kolom */
    .grid-video.peserta-3,
    .grid-video.peserta-4 { grid-template-columns: repeat(2, 1fr); }
    /* 5-6 peserta - 3 kolom */
    .grid-video.peserta-5,
    .grid-video.peserta-6 { grid-template-columns: repeat(3, 1fr); }
    /* 7+ peserta - 4 kolom */
    .grid-video.peserta-banyak { grid-template-columns: repeat(4, 1fr); }

    .kotak-video {
      position: relative;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
      width: 100%;
    }
    .kotak-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .kotak-video .label-nama {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white;
      padding: 16px 10px 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .kotak-video .avatar-besar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      background: #334155;
    }

    /* Kontrol video bawah */
    .kontrol-video {
      background: #1e293b;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-top: 1px solid #334155;
    }

    .btn-kontrol {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-kontrol.aktif { background: #3b82f6; color: white; }
    .btn-kontrol.nonaktif { background: #ef4444; color: white; }
    .btn-kontrol.merah { background: #ef4444; color: white; }
    .btn-kontrol.abu { background: #334155; color: white; }

    /* ---- PANEL PAPAN TULIS ---- */
    #panel-papan { background: #e5e7eb; flex-direction: column; }
    .toolbar-papan {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }
    .toolbar-papan label { font-size: 12px; color: #666; align-self: center; }
    #papan-canvas { cursor: crosshair; touch-action: none; background: white; }
    #papan-canvas.mode-teks { cursor: text; }
    #papan-canvas.mode-hapus { cursor: cell; }
    #papan-canvas.mode-pan { cursor: grab; }
    #papan-canvas.mode-pan:active { cursor: grabbing; }
    #papan-zoom-wrapper.mode-pan { cursor: grab; }
    #papan-zoom-wrapper.mode-pan:active { cursor: grabbing; }
    .siswa-papan-info { padding: 10px 16px; background: #dbeafe; font-size: 13px; color: #1e40af; display: none; }
    /* Teks preview real-time di atas canvas */
    #preview-teks-papan {
      position: absolute;
      pointer-events: none;
      z-index: 19;
      font-bold: bold;
      white-space: pre;
      display: none;
    }

    /* ---- PANEL TUGAS ---- */
    #panel-tugas { flex-direction: column; background: white; overflow-y: auto; padding: 20px; }

    .kartu-tugas {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .kartu-tugas .judul-tugas { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .kartu-tugas .soal-tugas {
      background: #fefce8;
      border: 1px solid #fef08a;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .kartu-tugas textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
    }

    /* ---- SIDEBAR CHAT ---- */
    .sidebar-chat {
      width: 280px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #334155;
      flex-shrink: 0;
    }
    .sidebar-chat h4 { 
      padding: 12px 16px;
      color: white;
      font-size: 13px;
      border-bottom: 1px solid #334155;
    }

    /* Daftar peserta */
    .daftar-peserta-chat {
      padding: 10px 16px;
      border-bottom: 1px solid #334155;
      max-height: 120px;
      overflow-y: auto;
    }
    .item-peserta {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      font-size: 12px;
      padding: 3px 0;
    }
    .item-peserta .dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
    .item-peserta .guru-tag { color: #60a5fa; font-weight: 700; }

    /* Pesan chat */
    .area-pesan-chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .buble-chat {
      background: #334155;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }
    .buble-chat .pengirim { font-weight: 700; margin-bottom: 2px; }
    .buble-chat .pengirim.guru { color: #60a5fa; }
    .buble-chat .pengirim.siswa { color: #4ade80; }
    .buble-chat .isi { color: #e2e8f0; }
    .buble-chat .wkt { font-size: 10px; color: #64748b; margin-top: 3px; }

    /* Input chat */
    .input-chat-area {
      padding: 10px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 6px;
    }
    .input-chat-area input {
      flex: 1;
      background: #334155;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 13px;
    }
    .input-chat-area input::placeholder { color: #64748b; }
    .input-chat-area input:focus { outline: 1px solid #60a5fa; }
    .input-chat-area button { 
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    /* Notifikasi angkat tangan */
    .notif-tangan {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #f59e0b;
      color: #451a03;
      padding: 10px 20px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 14px;
      display: none;
      z-index: 100;
      animation: slideIn 0.3s ease;
    }

    /* ---- MOBILE LAYOUT ---- */
    @media (max-width: 640px) {
      .area-utama {
        flex-direction: column;
      }

      /* Video area ambil ruang secukupnya, tidak terlalu besar */
      .area-video {
        flex: none;
        height: 55vh;
      }

      /* Grid video di HP lebih kecil */
      .grid-video {
        padding: 6px;
        gap: 6px;
      }

      /* Kontrol video lebih ramping di HP */
      .kontrol-video {
        padding: 8px 12px;
        gap: 8px;
      }
      .btn-kontrol {
        width: 40px;
        height: 40px;
        font-size: 15px;
      }

      /* Sidebar chat: sisanya di bawah, tidak full screen */
      .sidebar-chat {
        width: 100%;
        flex: 1;
        border-left: none;
        border-top: 1px solid #334155;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      /* Daftar peserta lebih ramping */
      .daftar-peserta-chat {
        max-height: 60px;
        padding: 6px 12px;
      }

      /* Area pesan chat mengisi sisa ruang */
      .area-pesan-chat {
        flex: 1;
        min-height: 0;
      }

      /* Input chat tetap kelihatan */
      .input-chat-area {
        padding: 8px;
        flex-shrink: 0;
      }

      /* Tab nav lebih kecil di HP */
      .tab-nav button {
        padding: 8px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header-ruang">
  <div class="kiri">
    <span style="display:flex;align-items:center;gap:8px;">
      <img src="/icons/icon-72x72.png" alt="Z" style="width:28px;height:28px;border-radius:7px;object-fit:cover;">
      ZooMimanu
    </span>
    <span class="kode-ruang" id="kode-ruang-header">-</span>
    <span class="status-live">● LIVE</span>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <span style="color:#94a3b8; font-size:13px;" id="nama-saya-header">-</span>
    <button class="btn btn-kecil btn-merah" onclick="keluarRuang()">Keluar</button>
  </div>
</div>

<!-- Area Utama -->
<div class="area-utama">
  <!-- Kiri: Video + Papan + Tugas -->
  <div class="area-video">
    <!-- Tab -->
    <div class="tab-nav">
      <button class="aktif" onclick="gantiPanel('video', this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Video Call
      </button>
      <button onclick="gantiPanel('papan', this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Papan Tulis
      </button>
      <button onclick="gantiPanel('tugas', this)" id="tab-tugas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Tugas <span id="badge-tugas" style="display:none; background:#ef4444; color:white; border-radius:50%; padding:1px 6px; font-size:11px;">!</span>
      </button>
    </div>

    <!-- Panel Video -->
    <div class="panel tampil" id="panel-video">
      <div class="grid-video" id="grid-video">
        <!-- Video lokal -->
        <div class="kotak-video" id="kotak-video-lokal">
          <video id="video-lokal" autoplay muted playsinline></video>
          <div class="avatar-besar" id="avatar-lokal" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="label-nama" id="label-saya">Anda</div>
        </div>
      </div>
      <div class="kontrol-video">
        <button class="btn-kontrol aktif" id="btn-mic" onclick="toggleMic()" title="Mikrofon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="btn-kontrol aktif" id="btn-cam" onclick="toggleCam()" title="Kamera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
        <button class="btn-kontrol abu" onclick="angkatTangan()" title="Angkat Tangan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 00-4 0v5"/><path d="M14 10V4a2 2 0 00-4 0v2"/><path d="M10 10.5V6a2 2 0 00-4 0v8"/><path d="M18 8a2 2 0 114 0v6a8 8 0 01-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 012.83-2.82L8 15"/></svg>
        </button>
        <button class="btn-kontrol merah" onclick="keluarRuang()" title="Keluar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Panel Papan Tulis -->
    <div class="panel" id="panel-papan">
      <div class="siswa-papan-info" id="info-papan-siswa">
        👁️ Mode lihat saja &mdash; hanya guru yang bisa menggambar &amp; menulis.
        <span style="margin-left:12px;">Zoom: <button class="btn btn-kecil btn-abu" style="padding:2px 8px;" onclick="zoomPapan(-0.2)">−</button> <span id="label-zoom-siswa" style="font-size:11px;">100%</span> <button class="btn btn-kecil btn-abu" style="padding:2px 8px;" onclick="zoomPapan(0.2)">+</button></span>
      </div>
      <div class="toolbar-papan" id="toolbar-papan">
        <label>Warna:</label>
        <input type="color" id="warna-papan" value="#000000" style="width:36px; height:32px; border:none; cursor:pointer; border-radius:4px;">
        <label>Ukuran:</label>
        <input type="range" id="ukuran-kuas" min="2" max="30" value="4" style="width:80px;">
        <button class="btn btn-kecil btn-abu" onclick="gantiAlat('pena')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Pena
        </button>
        <button class="btn btn-kecil btn-abu" onclick="gantiAlat('hapus')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Hapus
        </button>
        <button class="btn btn-kecil btn-abu" onclick="gantiAlat('teks')" id="btn-alat-teks" title="Ketik teks di papan tulis">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          Teks
        </button>
        <button class="btn btn-kecil btn-abu" onclick="gantiAlat('pan')" id="btn-alat-pan" title="Geser / Pan (saat zoom)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 00-4 0v5"/><path d="M14 10V4a2 2 0 00-4 0v2"/><path d="M10 10.5V6a2 2 0 00-4 0v8"/><path d="M18 8a2 2 0 114 0v6a8 8 0 01-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 012.83-2.82L8 15"/></svg>
          Geser
        </button>
        <button class="btn btn-kecil btn-abu" id="btn-undo" onclick="undoPapan()" title="Undo (Ctrl+Z)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
          Undo
        </button>
        <button class="btn btn-kecil btn-abu" id="btn-redo" onclick="redoPapan()" title="Redo (Ctrl+Y)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
          Redo
        </button>
        <button class="btn btn-kecil btn-merah" onclick="bersihkanPapan()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Bersihkan
        </button>
        <span style="display:flex;align-items:center;gap:4px;margin-left:4px;">
          <button class="btn btn-kecil btn-abu" onclick="zoomPapan(-0.2)" title="Zoom out">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span id="label-zoom" style="font-size:11px;color:#555;min-width:36px;text-align:center;">100%</span>
          <button class="btn btn-kecil btn-abu" onclick="zoomPapan(0.2)" title="Zoom in">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button class="btn btn-kecil btn-abu" onclick="resetZoomPapan()" title="Reset zoom">Reset</button>
        </span>
        <label class="btn btn-kecil" style="background:#6C3CE1;color:white;cursor:pointer;" title="Upload file untuk Presentasi (PDF, Gambar, Word, PPT)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Presentasi
          <input type="file" id="input-presentasi" accept="*/*" style="display:none;" onchange="muatPresentasi(this)">
        </label>
        <span id="info-presentasi" style="font-size:12px;color:#6C3CE1;font-weight:700;display:none;">
          <button class="btn btn-kecil btn-abu" onclick="navigasiHalaman(-1)">&#8592;</button>
          <span id="teks-halaman">1/1</span>
          <button class="btn btn-kecil btn-abu" onclick="navigasiHalaman(1)">&#8594;</button>

<script>
// =====================================================
// INISIALISASI
// =====================================================
let penggunaSaatIni = null;
let ruangSaatIni = null;
let socket = null;
let streamLokal = null;
let mikAktif = true;
let camAktif = true;
let alatPapan = 'pena';

// Menyimpan koneksi WebRTC per socket pengguna lain
const koneksiPeer = {};
const streamPeer = {};

window.onload = async function() {
  const dataUser = localStorage.getItem('penggunaSaatIni');
  const dataRuang = localStorage.getItem('ruangSaatIni');

  if (!dataUser || !dataRuang) {
    alert('Session habis. Silakan login kembali.');
    window.location.href = '/';
    return;
  }

  penggunaSaatIni = JSON.parse(dataUser);
  ruangSaatIni = JSON.parse(dataRuang);

  // Update UI header
  document.getElementById('kode-ruang-header').textContent = ruangSaatIni.kode;
  document.getElementById('nama-saya-header').textContent = 
    penggunaSaatIni.namaGuru || penggunaSaatIni.nama;
  document.getElementById('label-saya').textContent = 
    `${penggunaSaatIni.namaGuru || penggunaSaatIni.nama} (Anda)`;
  document.getElementById('nama-sendiri-list').textContent = 
    `${penggunaSaatIni.namaGuru || penggunaSaatIni.nama} (Anda) ` + 
    (penggunaSaatIni.role === 'guru' ? '👩‍🏫' : '🎒');

  // Tampilkan/sembunyikan toolbar papan
  if (penggunaSaatIni.role === 'siswa') {
    document.getElementById('toolbar-papan').style.display = 'none';
    document.getElementById('info-papan-siswa').style.display = 'block';
  }

  // Mulai kamera & mic
  await mulaiMedia();

  // Hubungkan ke server
  hubungkanSocket();

  // Setup papan tulis
  setupPapanTulis();
};

// =====================================================
// MEDIA (KAMERA & MIC)
// =====================================================
async function mulaiMedia() {
  try {
    streamLokal = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    const videoEl = document.getElementById('video-lokal');
    videoEl.srcObject = streamLokal;
    document.getElementById('avatar-lokal').style.display = 'none';
  } catch (err) {
    console.log('Kamera tidak tersedia:', err);
    // Buat stream kosong jika tidak ada kamera
    document.getElementById('avatar-lokal').style.display = 'flex';
    document.getElementById('video-lokal').style.display = 'none';
    try {
      // Coba audio saja
      streamLokal = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e) {
      console.log('Mic juga tidak tersedia');
    }
  }
}

function toggleMic() {
  mikAktif = !mikAktif;
  if (streamLokal) {
    streamLokal.getAudioTracks().forEach(t => t.enabled = mikAktif);
  }
  const btn = document.getElementById('btn-mic');
  btn.innerHTML = mikAktif
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/><path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
  btn.className = `btn-kontrol ${mikAktif ? 'aktif' : 'nonaktif'}`;
  socket.emit('toggle-audio', { ruangId: ruangSaatIni.id, status: mikAktif });
}

function toggleCam() {
  camAktif = !camAktif;
  if (streamLokal) {
    streamLokal.getVideoTracks().forEach(t => t.enabled = camAktif);
  }
  const btn = document.getElementById('btn-cam');
  btn.innerHTML = camAktif
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 01-2-2V8a2 2 0 012-2h3m3-3h6l2 3h4a2 2 0 012 2v9.34m-7.72-2.06a4 4 0 11-5.56-5.56"/></svg>`;
  btn.className = `btn-kontrol ${camAktif ? 'aktif' : 'nonaktif'}`;
  socket.emit('toggle-video', { ruangId: ruangSaatIni.id, status: camAktif });
}

// =====================================================
// SOCKET.IO - KONEKSI REAL-TIME
// =====================================================
function hubungkanSocket() {
  socket = io();
  const namaUser = penggunaSaatIni.namaGuru || penggunaSaatIni.nama;
  const role = penggunaSaatIni.role;

  // Bergabung ke ruang
  socket.emit('bergabung-ruang', {
    ruangId: ruangSaatIni.id,
    userId: penggunaSaatIni.id,
    namaUser,
    role
  });

  // Terima daftar pengguna online
  socket.on('daftar-pengguna-online', (daftar) => {
    daftar.forEach(pengguna => {
      if (pengguna.socketId !== socket.id) {
        tambahPeserta(pengguna.socketId, pengguna.namaUser, pengguna.role);
        // Mulai WebRTC call ke pengguna yang sudah ada
        mulaiWebRTC(pengguna.socketId, true);
      }
    });
  });

  // Ada pengguna baru bergabung
  socket.on('pengguna-bergabung', ({ socketId, namaUser, role }) => {
    tambahPeserta(socketId, namaUser, role);
    tambahPesanChat('sistem', `${namaUser} bergabung ke ruangan`, '');
    // Tunggu WebRTC offer dari mereka (bukan kita yang mulai)
  });

  // Pengguna keluar
  socket.on('pengguna-keluar', ({ socketId, namaUser }) => {
    hapusPeserta(socketId, namaUser);
    hapusVideoRemote(socketId);
    if (koneksiPeer[socketId]) {
      koneksiPeer[socketId].close();
      delete koneksiPeer[socketId];
    }
  });

  // ---- WebRTC Signaling ----
  socket.on('webrtc-offer', async ({ dariSocketId, offer }) => {
    await terimaOffer(dariSocketId, offer);
  });

  socket.on('webrtc-answer', async ({ dariSocketId, answer }) => {
    if (koneksiPeer[dariSocketId]) {
      await koneksiPeer[dariSocketId].setRemoteDescription(answer);
    }
  });

  socket.on('webrtc-ice-candidate', async ({ dariSocketId, candidate }) => {
    if (koneksiPeer[dariSocketId] && candidate) {
      try { await koneksiPeer[dariSocketId].addIceCandidate(candidate); } catch(e) {}
    }
  });

  // ---- Chat ----
  socket.on('pesan-chat', ({ namaUser, pesan, role, waktu }) => {
    tambahPesanChat(namaUser, pesan, role, waktu);
  });

  // ---- Papan Tulis ----
  socket.on('papan-tulis-gambar', (data) => {
    gambarDariRemote(data);
  });

  socket.on('papan-tulis-bersihkan', () => {
    const canvas = document.getElementById('papan-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  socket.on('papan-tulis-teks', (data) => {
    teksFromRemote(data);
    // Hapus preview setelah teks ditempel
    previewTeksFromRemote(null);
  });

  socket.on('papan-tulis-preview-teks', (data) => {
    // Hanya siswa yang menampilkan preview (guru sudah lihat di input)
    if (penggunaSaatIni.role !== 'guru') {
      previewTeksFromRemote(data);
    }
  });

  // ---- Presentasi dari Guru ----
  socket.on('presentasi-halaman', ({ imageData, halaman, totalHalaman, namaFile }) => {
    // Otomatis pindah ke tab Papan Tulis agar siswa langsung melihat presentasi
    const tabPapan = document.querySelector('.tab-nav button:nth-child(2)');
    gantiPanel('papan', tabPapan);
    // Beri sedikit jeda agar canvas selesai di-resize sebelum digambar
    setTimeout(() => {
      gambarKeCanvas(imageData);
    }, 80);
    tampilNotif('📄 ' + namaFile + ' — Halaman ' + halaman + '/' + totalHalaman);
  });

  socket.on('presentasi-selesai', () => {
    const canvas = document.getElementById('papan-canvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    tampilNotif('✅ Presentasi selesai');
  });

  // ---- Tugas Baru ----
  socket.on('tugas-baru', (tugas) => {
    tampilTugasBaru(tugas);
    document.getElementById('badge-tugas').style.display = 'inline';
  });

  // ---- Angkat Tangan ----
  socket.on('siswa-angkat-tangan', ({ namaUser }) => {
    if (penggunaSaatIni.role === 'guru') {
      const el = document.getElementById('notif-tangan');
      el.textContent = `✋ ${namaUser} angkat tangan!`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }
  });
}

// =====================================================
// WebRTC - VIDEO CALL
// =====================================================

// Cache konfigurasi WebRTC dari server (STUN + TURN)
let webRTCConfig = null;
async function ambilWebRTCConfig() {
  if (webRTCConfig) return webRTCConfig;
  try {
    const resp = await fetch('/api/webrtc-config');
    webRTCConfig = await resp.json();
  } catch (e) {
    // Fallback jika gagal ambil config
    webRTCConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };
  }
  return webRTCConfig;
}

async function mulaiWebRTC(targetSocketId, kirimOffer) {
  const config = await ambilWebRTCConfig();
  const pc = new RTCPeerConnection(config);

  koneksiPeer[targetSocketId] = pc;

  // Tambahkan stream lokal
  if (streamLokal) {
    streamLokal.getTracks().forEach(track => pc.addTrack(track, streamLokal));
  }

  // Terima stream dari remote
  pc.ontrack = (event) => {
    tampilVideoRemote(targetSocketId, event.streams[0]);
  };

  // Kirim ICE candidate ke peer
  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit('webrtc-ice-candidate', {
        tujuanSocketId: targetSocketId,
        candidate: event.candidate
      });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      hapusVideoRemote(targetSocketId);
    }
  };

  if (kirimOffer) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('webrtc-offer', { tujuanSocketId: targetSocketId, offer });
  }
}

async function terimaOffer(dariSocketId, offer) {
  await mulaiWebRTC(dariSocketId, false);
  const pc = koneksiPeer[dariSocketId];
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('webrtc-answer', { tujuanSocketId: dariSocketId, answer });
}

function tampilVideoRemote(socketId, stream) {
  // Hapus jika sudah ada
  hapusVideoRemote(socketId);

  const div = document.createElement('div');
  div.className = 'kotak-video';
  div.id = `video-${socketId}`;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsinline = true;
  video.srcObject = stream;

  const label = document.createElement('div');
  label.className = 'label-nama';
  const peserta = document.querySelector(`[data-socket="${socketId}"]`);
  label.textContent = peserta ? peserta.dataset.nama : 'Peserta';

  div.appendChild(video);
  div.appendChild(label);
  document.getElementById('grid-video').appendChild(div);
  updateGridVideo();
}

function hapusVideoRemote(socketId) {
  const el = document.getElementById(`video-${socketId}`);
  if (el) el.remove();
  updateGridVideo();
}

function updateGridVideo() {
  const grid = document.getElementById('grid-video');
  const jumlah = grid.querySelectorAll('.kotak-video').length;
  // Hapus semua class peserta
  grid.className = 'grid-video';
  if (jumlah === 1) grid.classList.add('peserta-1');
  else if (jumlah === 2) grid.classList.add('peserta-2');
  else if (jumlah === 3) grid.classList.add('peserta-3');
  else if (jumlah === 4) grid.classList.add('peserta-4');
  else if (jumlah === 5) grid.classList.add('peserta-5');
  else if (jumlah === 6) grid.classList.add('peserta-6');
  else grid.classList.add('peserta-banyak');
}

// PESERTA

function tambahPeserta(socketId, nama, role) {
  const container = document.getElementById('daftar-peserta');

function hapusPeserta(socketId, nama) {

function kirimChat() {
  const input = document.getElementById('input-chat');
  const pesan = input.value.trim();
  if (!pesan) return;

  const namaUser = penggunaSaatIni.namaGuru || penggunaSaatIni.nama;

function tambahPesanChat(nama, pesan, role, waktu = '') {

// =====================================================
// ZOOM PAPAN TULIS
// =====================================================
let zoomLevel = 1.0;
// Untuk pan (geser saat zoom)
let panX = 0, panY = 0;

function zoomPapan(delta, cx, cy) {
  const wrapper = document.getElementById('papan-zoom-wrapper');
  const inner = document.getElementById('papan-zoom-inner');
  if (!wrapper || !inner) return;

  // Titik pusat zoom (default: tengah wrapper)
  if (cx === undefined) cx = wrapper.clientWidth / 2;
  if (cy === undefined) cy = wrapper.clientHeight / 2;

  // Hitung posisi relatif terhadap inner sebelum zoom
  const scaledX = (cx + wrapper.scrollLeft - panX) / zoomLevel;
  const scaledY = (cy + wrapper.scrollTop - panY) / zoomLevel;

  const sebelum = zoomLevel;
  zoomLevel = Math.min(4, Math.max(0.3, zoomLevel + delta));
  if (zoomLevel === sebelum) return;

  terapkanZoom();

  // Sesuaikan scroll agar titik pusat tetap di posisi sama
  wrapper.scrollLeft = scaledX * zoomLevel + panX - cx;
  wrapper.scrollTop  = scaledY * zoomLevel + panY - cy;
}

function resetZoomPapan() {
  zoomLevel = 1.0;
  panX = 0; panY = 0;
  terapkanZoom();
  const wrapper = document.getElementById('papan-zoom-wrapper');
  if (wrapper) { wrapper.scrollLeft = 0; wrapper.scrollTop = 0; }
}

function terapkanZoom() {
  const inner = document.getElementById('papan-zoom-inner');
  if (inner) inner.style.transform = `scale(${zoomLevel})`;
  const persen = Math.round(zoomLevel * 100) + '%';
  const label = document.getElementById('label-zoom');
  if (label) label.textContent = persen;
  const labelPres = document.getElementById('label-zoom-pres');
  if (labelPres) labelPres.textContent = persen;
  const labelSiswa = document.getElementById('label-zoom-siswa');
  if (labelSiswa) labelSiswa.textContent = persen;
}

// =====================================================
// UNDO / REDO
// =====================================================
let undoStack = [];
let redoStack = [];

function simpanStateUndoPapan() {
  const canvas = document.getElementById('papan-canvas');
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 40) undoStack.shift(); // Batas maksimum 40 state
  redoStack = []; // Reset redo setiap aksi baru
}

function undoPapan() {
  if (undoStack.length === 0) return;
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  redoStack.push(canvas.toDataURL());
  const prev = undoStack.pop();
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  };
  img.src = prev;
}

function redoPapan() {
  if (redoStack.length === 0) return;
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  undoStack.push(canvas.toDataURL());
  const next = redoStack.pop();
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  };
  img.src = next;
}

// =====================================================
// PAPAN TULIS
// =====================================================
function setupPapanTulis() {
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  let sedangGambar = false;
  let posSebelumnya = null;
  // Pan state
  let sedangPan = false;
  let panStart = { x: 0, y: 0 };
  let scrollStart = { x: 0, y: 0 };
  // Pinch zoom
  let pinchJarak = null;

  // Ukuran canvas berdasarkan wrapper
  function updateUkuranCanvas() {
    const wrapper = document.getElementById('papan-zoom-wrapper');
    if (!wrapper || wrapper.clientWidth === 0) return;
    // Simpan konten lama
    const imgData = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
    canvas.width = Math.max(wrapper.clientWidth, 1280);
    canvas.height = Math.max(wrapper.clientHeight, 720);
    try { ctx.putImageData(imgData, 0, 0); } catch(e) {}
  }
  updateUkuranCanvas();
  window.addEventListener('resize', updateUkuranCanvas);

  // Simpan state awal untuk undo
  setTimeout(() => simpanStateUndoPapan(), 200);

  // --- Pinch zoom untuk wrapper (semua pengguna) ---
  const wrapper = document.getElementById('papan-zoom-wrapper');

  wrapper.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      pinchJarak = jarakDuaJari(e.touches);
    }
  }, { passive: true });

  wrapper.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const jarakBaru = jarakDuaJari(e.touches);
      if (pinchJarak !== null) {
        const delta = (jarakBaru - pinchJarak) * 0.008;
        // Titik tengah antara dua jari
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - wrapper.getBoundingClientRect().left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - wrapper.getBoundingClientRect().top;
        zoomPapan(delta, midX, midY);
      }
      pinchJarak = jarakBaru;
    }
  }, { passive: false });

  wrapper.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) pinchJarak = null;
  }, { passive: true });

  // Ctrl+scroll zoom
  wrapper.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const rect = wrapper.getBoundingClientRect();
      zoomPapan(e.deltaY < 0 ? 0.1 : -0.1, e.clientX - rect.left, e.clientY - rect.top);
    }
  }, { passive: false });

  // Hanya guru yang bisa menggambar/menulis
  if (penggunaSaatIni.role !== 'guru') return;

  // Keyboard shortcut undo/redo
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undoPapan(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redoPapan(); }
  });

  // --- Input teks ---
  const inputTeks = document.getElementById('input-teks-papan');
  const previewTeks = document.getElementById('preview-teks-papan');
  let teksPosX = 0, teksPosY = 0;

  function tampilInputTeks(x, y) {
    teksPosX = x; teksPosY = y;
    const warna = document.getElementById('warna-papan').value;
    const ukuran = parseInt(document.getElementById('ukuran-kuas').value);
    const ukuranFont = Math.max(14, ukuran * 3);

    inputTeks.style.left = x + 'px';
    inputTeks.style.top = (y - ukuranFont - 4) + 'px';
    inputTeks.style.fontSize = ukuranFont + 'px';
    inputTeks.style.color = warna;
    inputTeks.style.fontWeight = 'bold';
    inputTeks.style.fontFamily = 'sans-serif';
    inputTeks.style.display = 'block';
    inputTeks.value = '';

    // Setup preview
    previewTeks.style.left = x + 'px';
    previewTeks.style.top = (y - ukuranFont - 4) + 'px';
    previewTeks.style.fontSize = ukuranFont + 'px';
    previewTeks.style.fontWeight = 'bold';
    previewTeks.style.fontFamily = 'sans-serif';
    previewTeks.style.color = warna;
    previewTeks.style.display = 'block';
    previewTeks.textContent = '';

    inputTeks.focus();
  }

  function sembunyikanInputTeks() {
    inputTeks.style.display = 'none';
    inputTeks.value = '';
    if (previewTeks) { previewTeks.style.display = 'none'; previewTeks.textContent = ''; }
    // Broadcast hide preview
    socket.emit('papan-tulis-preview-teks', {
      ruangId: ruangSaatIni.id,
      data: null // null = hapus preview
    });
  }

  // Update preview saat guru mengetik
  inputTeks.addEventListener('input', () => {
    const teks = inputTeks.value;
    const warna = document.getElementById('warna-papan').value;
    const ukuran = parseInt(document.getElementById('ukuran-kuas').value);
    const ukuranFont = Math.max(14, ukuran * 3);
    // Update preview lokal
    previewTeks.textContent = teks || '';
    // Broadcast preview ke siswa
    socket.emit('papan-tulis-preview-teks', {
      ruangId: ruangSaatIni.id,
      data: teks ? { x: teksPosX, y: teksPosY, teks, warna, ukuranFont } : null
    });
  });

  inputTeks.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const teks = inputTeks.value.trim();
      if (teks) {
        simpanStateUndoPapan();
        const warna = document.getElementById('warna-papan').value;
        const ukuran = parseInt(document.getElementById('ukuran-kuas').value);
        const ukuranFont = Math.max(14, ukuran * 3);
        tuliskanTeksKeCanvas(ctx, teksPosX, teksPosY, teks, warna, ukuranFont);
        socket.emit('papan-tulis-teks', {
          ruangId: ruangSaatIni.id,
          data: { x: teksPosX, y: teksPosY, teks, warna, ukuranFont }
        });
      }
      sembunyikanInputTeks();
    } else if (e.key === 'Escape') {
      sembunyikanInputTeks();
    }
  });

  inputTeks.addEventListener('blur', () => {
    const teks = inputTeks.value.trim();
    if (teks) {
      simpanStateUndoPapan();
      const warna = document.getElementById('warna-papan').value;
      const ukuran = parseInt(document.getElementById('ukuran-kuas').value);
      const ukuranFont = Math.max(14, ukuran * 3);
      tuliskanTeksKeCanvas(ctx, teksPosX, teksPosY, teks, warna, ukuranFont);
      socket.emit('papan-tulis-teks', {
        ruangId: ruangSaatIni.id,
        data: { x: teksPosX, y: teksPosY, teks, warna, ukuranFont }
      });
    }
    sembunyikanInputTeks();
  });

  // --- Posisi kursor di canvas ---
  function getPosisi(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) * (canvas.width / rect.width),
      y: (touch.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function gambarGaris(dari, ke, warna, ukuran, hapus) {
    ctx.beginPath();
    ctx.moveTo(dari.x, dari.y);
    ctx.lineTo(ke.x, ke.y);
    ctx.strokeStyle = hapus ? '#ffffff' : warna;
    ctx.lineWidth = hapus ? parseInt(ukuran) * 3 : parseInt(ukuran);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // --- MOUSE EVENTS ---
  canvas.addEventListener('mousedown', (e) => {
    if (alatPapan === 'teks') {
      const pos = getPosisi(e);
      tampilInputTeks(pos.x, pos.y);
      return;
    }
    if (alatPapan === 'pan') {
      sedangPan = true;
      panStart = { x: e.clientX, y: e.clientY };
      scrollStart = { x: wrapper.scrollLeft, y: wrapper.scrollTop };
      return;
    }
    simpanStateUndoPapan();
    sedangGambar = true;
    posSebelumnya = getPosisi(e);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (alatPapan === 'teks') return;
    if (alatPapan === 'pan') {
      if (!sedangPan) return;
      wrapper.scrollLeft = scrollStart.x - (e.clientX - panStart.x);
      wrapper.scrollTop  = scrollStart.y - (e.clientY - panStart.y);
      return;
    }
    if (!sedangGambar) return;
    const posSekarang = getPosisi(e);
    const warna = document.getElementById('warna-papan').value;
    const ukuran = document.getElementById('ukuran-kuas').value;
    const hapus = alatPapan === 'hapus';

    gambarGaris(posSebelumnya, posSekarang, warna, ukuran, hapus);
    socket.emit('papan-tulis-gambar', {
      ruangId: ruangSaatIni.id,
      data: { dari: posSebelumnya, ke: posSekarang, warna, ukuran, hapus }
    });
    posSebelumnya = posSekarang;
  });

  canvas.addEventListener('mouseup', () => { sedangGambar = false; sedangPan = false; });
  canvas.addEventListener('mouseleave', () => { sedangGambar = false; sedangPan = false; });

  // --- TOUCH EVENTS ---
  canvas.addEventListener('touchstart', (e) => {
    // Pinch: sudah ditangani di wrapper
    if (e.touches.length >= 2) { sedangGambar = false; return; }
    e.preventDefault();
    if (alatPapan === 'teks') {
      const pos = getPosisi(e);
      tampilInputTeks(pos.x, pos.y);
      return;
    }
    if (alatPapan === 'pan') {
      sedangPan = true;
      panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      scrollStart = { x: wrapper.scrollLeft, y: wrapper.scrollTop };
      return;
    }
    simpanStateUndoPapan();
    sedangGambar = true;
    posSebelumnya = getPosisi(e);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length >= 2) return; // pinch ditangani wrapper
    e.preventDefault();
    if (alatPapan === 'teks') return;
    if (alatPapan === 'pan') {
      if (!sedangPan) return;
      wrapper.scrollLeft = scrollStart.x - (e.touches[0].clientX - panStart.x);
      wrapper.scrollTop  = scrollStart.y - (e.touches[0].clientY - panStart.y);
      return;
    }
    if (!sedangGambar) return;
    const posSekarang = getPosisi(e);
    const warna = document.getElementById('warna-papan').value;
    const ukuran = document.getElementById('ukuran-kuas').value;
    const hapus = alatPapan === 'hapus';

    gambarGaris(posSebelumnya, posSekarang, warna, ukuran, hapus);
    socket.emit('papan-tulis-gambar', {
      ruangId: ruangSaatIni.id,
      data: { dari: posSebelumnya, ke: posSekarang, warna, ukuran, hapus }
    });
    posSebelumnya = posSekarang;
  }, { passive: false });

  canvas.addEventListener('touchend', () => { sedangGambar = false; sedangPan = false; });
}

// Helper: jarak dua jari
function jarakDuaJari(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// Ctrl+scroll untuk siswa (wrapper disetup di setupPapanTulis juga, ini fallback)
document.addEventListener('DOMContentLoaded', () => {
  const wrapper = document.getElementById('papan-zoom-wrapper');
  if (wrapper) {
    // Pinch zoom untuk siswa
    let pinchSiswa = null;
    wrapper.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) pinchSiswa = jarakDuaJari(e.touches);
    }, { passive: true });
    wrapper.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && pinchSiswa !== null) {
        e.preventDefault();
        const jarakBaru = jarakDuaJari(e.touches);
        const delta = (jarakBaru - pinchSiswa) * 0.008;
        const rect = wrapper.getBoundingClientRect();
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        zoomPapan(delta, midX, midY);
        pinchSiswa = jarakBaru;
      }
    }, { passive: false });
    wrapper.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) pinchSiswa = null;
    }, { passive: true });
  }
});

function tuliskanTeksKeCanvas(ctx, x, y, teks, warna, ukuranFont) {
  ctx.font = `bold ${ukuranFont}px sans-serif`;
  ctx.fillStyle = warna;
  ctx.fillText(teks, x, y);
}

function gambarDariRemote(data) {
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.moveTo(data.dari.x, data.dari.y);
  ctx.lineTo(data.ke.x, data.ke.y);
  ctx.strokeStyle = data.hapus ? '#ffffff' : data.warna;
  ctx.lineWidth = data.hapus ? parseInt(data.ukuran) * 3 : parseInt(data.ukuran);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function teksFromRemote(data) {
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  tuliskanTeksKeCanvas(ctx, data.x, data.y, data.teks, data.warna, data.ukuranFont);
}

// Preview teks real-time dari guru (diterima siswa)
function previewTeksFromRemote(data) {
  const previewEl = document.getElementById('preview-teks-papan');
  if (!previewEl) return;
  if (!data) {
    previewEl.style.display = 'none';
    previewEl.textContent = '';
    return;
  }
  previewEl.style.left = data.x + 'px';
  previewEl.style.top = (data.y - data.ukuranFont - 4) + 'px';
  previewEl.style.fontSize = data.ukuranFont + 'px';
  previewEl.style.fontWeight = 'bold';
  previewEl.style.fontFamily = 'sans-serif';
  previewEl.style.color = data.warna;
  previewEl.style.display = 'block';
  previewEl.textContent = data.teks;
}

function gantiAlat(alat) {
  alatPapan = alat;
  const canvas = document.getElementById('papan-canvas');
  const wrapper = document.getElementById('papan-zoom-wrapper');
  // Update cursor
  canvas.className = alat === 'teks' ? 'mode-teks' : alat === 'pan' ? 'mode-pan' : alat === 'hapus' ? 'mode-hapus' : '';
  if (wrapper) wrapper.className = alat === 'pan' ? 'mode-pan' : '';
  // Sembunyikan input teks jika ganti alat lain
  if (alat !== 'teks') {
    const inp = document.getElementById('input-teks-papan');
    if (inp) inp.style.display = 'none';
    const prev = document.getElementById('preview-teks-papan');
    if (prev) { prev.style.display = 'none'; prev.textContent = ''; }
  }
}

function bersihkanPapan() {
  if (!confirm('Yakin ingin membersihkan papan tulis?')) return;
  simpanStateUndoPapan();
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  socket.emit('papan-tulis-bersihkan', { ruangId: ruangSaatIni.id });
}

let halamanPresentasi = [];
let halamanSaatIni = 0;
let namaFilePresentasi = '';

function tampilInfoPresentasi(show) {
  const el = document.getElementById('info-presentasi');
  el.style.display = show ? 'inline-flex' : 'none';
  el.style.alignItems = 'center';
  el.style.gap = '4px';
}

function gambarKeCanvas(imageData) {
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    // Pastikan canvas punya ukuran - inisialisasi jika belum
    if (canvas.width === 0 || canvas.height === 0) {
      const parent = canvas.parentElement;
      canvas.width = parent.clientWidth || 1280;
      canvas.height = parent.clientHeight
        - (document.getElementById('toolbar-papan').offsetHeight || 0)
        - (document.getElementById('info-papan-siswa').offsetHeight || 0) || 720;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const x = (canvas.width - img.width * scale) / 2;
    const y = (canvas.height - img.height * scale) / 2;
    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
  };
  img.src = imageData;
}

async function muatPDF(file) {
  // Load PDF.js
  if (!window.pdfjsLib) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const offscreen = document.createElement('canvas');
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.8 });
    offscreen.width = viewport.width;
    offscreen.height = viewport.height;
    await page.render({ canvasContext: offscreen.getContext('2d'), viewport }).promise;
    pages.push(offscreen.toDataURL('image/jpeg', 0.9));
  }
  return pages;
}

async function muatGambar(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve([e.target.result]);
    reader.readAsDataURL(file);
  });
}

async function muatPresentasi(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  halamanPresentasi = [];
  halamanSaatIni = 0;
  namaFilePresentasi = file.name;

  // Tampil loading
  const canvas = document.getElementById('papan-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#555';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⏳ Memuat ' + file.name + ' ...', canvas.width/2, canvas.height/2);

  try {
    const tipe = file.type;
    const nama = file.name.toLowerCase();

    if (tipe === 'application/pdf' || nama.endsWith('.pdf')) {
      // PDF - render semua halaman
      halamanPresentasi = await muatPDF(file);

    } else if (tipe.startsWith('image/') || nama.match(/\.(png|jpg|jpeg|gif|webp|bmp|svg)$/)) {
      // Gambar langsung
      halamanPresentasi = await muatGambar(file);

    } else if (nama.match(/\.(ppt|pptx|doc|docx|xls|xlsx|odt|odp|ods)$/)) {
      // Office files - tampilkan pesan dan link download
      const reader = new FileReader();
      reader.onload = async (e) => {
        // Buat gambar placeholder dengan nama file
        const offscreen = document.createElement('canvas');
        offscreen.width = 1280;
        offscreen.height = 720;
        const c = offscreen.getContext('2d');
        c.fillStyle = '#1a1a2e';
        c.fillRect(0, 0, 1280, 720);
        c.fillStyle = '#6C3CE1';
        c.fillRect(0, 0, 1280, 8);
        c.fillStyle = 'white';
        c.font = 'bold 48px sans-serif';
        c.textAlign = 'center';
        // Ikon file
        const ext = nama.split('.').pop().toUpperCase();
        c.fillStyle = '#6C3CE1';
        c.fillRect(490, 200, 300, 220);
        c.fillStyle = 'white';
        c.font = 'bold 64px sans-serif';
        c.fillText(ext, 640, 350);
        c.fillStyle = 'white';
        c.font = 'bold 36px sans-serif';
        c.fillText(file.name, 640, 500);
        c.font = '24px sans-serif';
        c.fillStyle = '#aaa';
        c.fillText('📎 File sedang dipresentasikan oleh guru', 640, 560);
        halamanPresentasi = [offscreen.toDataURL('image/jpeg', 0.9)];
        tampilHalamanPresentasi(0);
      };
      reader.readAsArrayBuffer(file);
      return;

    } else {
      // File lain - tampilkan nama file saja
      const offscreen = document.createElement('canvas');
      offscreen.width = 1280;
      offscreen.height = 720;
      const c = offscreen.getContext('2d');
      c.fillStyle = '#1a1a2e';
      c.fillRect(0, 0, 1280, 720);
      c.fillStyle = 'white';
      c.font = 'bold 40px sans-serif';
      c.textAlign = 'center';
      c.fillText('📄 ' + file.name, 640, 340);
      c.font = '24px sans-serif';
      c.fillStyle = '#aaa';
      c.fillText('File sedang dipresentasikan', 640, 400);
      halamanPresentasi = [offscreen.toDataURL('image/jpeg', 0.9)];
    }

    if (halamanPresentasi.length === 0) {
      tampilNotif('❌ Gagal memuat file');
      return;
    }

    tampilInfoPresentasi(true);
    tampilHalamanPresentasi(0);

  } catch(err) {
    console.error(err);
    tampilNotif('❌ Gagal memuat file: ' + err.message);
  }
}

function tampilHalamanPresentasi(idx) {
  if (idx < 0 || idx >= halamanPresentasi.length) return;
  halamanSaatIni = idx;
  const imageData = halamanPresentasi[idx];

  gambarKeCanvas(imageData);
  document.getElementById('teks-halaman').textContent = (idx+1) + '/' + halamanPresentasi.length;

  // Broadcast ke semua peserta
  socket.emit('presentasi-halaman', {
    ruangId: ruangSaatIni.id,
    imageData,
    halaman: idx + 1,
    totalHalaman: halamanPresentasi.length,
    namaFile: namaFilePresentasi
  });
}

function navigasiHalaman(arah) {
  tampilHalamanPresentasi(halamanSaatIni + arah);
}

function akhiriPresentasi() {
  halamanPresentasi = [];
  halamanSaatIni = 0;
  tampilInfoPresentasi(false);
  const canvas = document.getElementById('papan-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  socket.emit('presentasi-selesai', { ruangId: ruangSaatIni.id });
  socket.emit('papan-tulis-bersihkan', { ruangId: ruangSaatIni.id });
}

function tampilTugasBaru(tugas) {
  const container = document.getElementById('konten-tugas');
  const sudahAda = document.getElementById(`tugas-${tugas.id}`);
  if (sudahAda) return;

  const div = document.createElement('div');
  div.className = 'kartu-tugas';
  div.id = `tugas-${tugas.id}`;

  const sudahDijawab = localStorage.getItem(`jawab-${tugas.id}`);

  div.innerHTML = `
    <div class="judul-tugas">📝 ${tugas.judul}</div>
    <div style="font-size:12px; color:var(--abu); margin-bottom:10px;">
      Dari: ${tugas.namaGuru} • ${new Date(tugas.dibuatPada).toLocaleTimeString('id-ID')}
    </div>
    <div class="soal-tugas">❓ ${tugas.soal}</div>
    ${penggunaSaatIni.role === 'siswa' ? `
      ${sudahDijawab ? `
        <div class="sudah-dijawab">✅ Jawaban kamu sudah terkirim: <em>${sudahDijawab}</em></div>
      ` : `
        <textarea id="jawaban-${tugas.id}" placeholder="Tulis jawabanmu di sini..."></textarea>
        <button class="btn btn-hijau" style="margin-top:8px;" onclick="kirimJawaban('${tugas.id}', '${tugas.judul}')">
          ✅ Kirim Jawaban
        </button>
      `}
    ` : `
      <p style="font-size:13px; color:var(--abu);">Menunggu jawaban dari siswa... (refresh untuk update)</p>
    `}
  `;

  // Bersihkan placeholder kosong
  if (container.querySelector('p')) container.innerHTML = '';
  container.appendChild(div);
}

async function kirimJawaban(tugasId, judulTugas) {
  const jawaban = document.getElementById(`jawaban-${tugasId}`).value.trim();
  if (!jawaban) return alert('Jawaban tidak boleh kosong!');

  const resp = await fetch('/api/tugas/jawab', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tugasId,
      siswaId: penggunaSaatIni.id,
      namaSiswa: penggunaSaatIni.nama,
      jawaban
    })
  });

  const hasil = await resp.json();
  if (hasil.sukses) {
    localStorage.setItem(`jawab-${tugasId}`, jawaban);
    const div = document.getElementById(`tugas-${tugasId}`);
    const area = div.querySelector('textarea');
    const btn = div.querySelector('button');
    if (area) area.replaceWith(Object.assign(document.createElement('div'), {
      className: 'sudah-dijawab',
      innerHTML: `✅ Jawaban terkirim: <em>${jawaban}</em>`
    }));
    if (btn) btn.remove();
  }
}

function tampilNotif(pesan) {
  const el = document.getElementById('notif-tangan');
  el.textContent = pesan;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function gantiPanel(nama, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('tampil'));
  document.getElementById(`panel-${nama}`).classList.add('tampil');
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('aktif'));
  el.classList.add('aktif');

  if (nama === 'tugas') document.getElementById('badge-tugas').style.display = 'none';

  // Inisialisasi ulang ukuran canvas setiap kali tab papan tulis dibuka
  if (nama === 'papan') {
    setTimeout(() => {
      const canvas = document.getElementById('papan-canvas');
      const wrapper = document.getElementById('papan-zoom-wrapper');
      const toolbar = document.getElementById('toolbar-papan');
      const info = document.getElementById('info-papan-siswa');
      canvas.width = wrapper.clientWidth;
      canvas.height = wrapper.clientHeight;
    }, 50);
  }
}

function keluarRuang() {
  if (confirm('Yakin ingin keluar dari ruang kelas?')) {
    if (streamLokal) streamLokal.getTracks().forEach(t => t.stop());
    window.location.href = penggunaSaatIni.role === 'guru' ? '/guru' : '/siswa';
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
