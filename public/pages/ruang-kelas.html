<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruang ZooMimanu - Terintegrasi</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; background: #0f172a; color: white; font-family: 'Nunito', sans-serif; 
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* HEADER */
    .header-ruang {
      background: #1e293b; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #334155; height: 60px;
    }

    /* MAIN LAYOUT: Grid 3 Kolom */
    .kontainer-utama {
      display: grid;
      grid-template-columns: 320px 1fr 300px;
      flex: 1;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    /* KOLOM 1: Video Call (In-Tab) */
    .panel-video {
      background: #111827; border-radius: 15px; overflow: hidden;
      display: flex; flex-direction: column; border: 1px solid #334155;
    }
    #tampilan-video { flex: 1; position: relative; background: #000; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .kontrol-mini {
      padding: 10px; background: #1e293b; display: flex; justify-content: center; gap: 8px;
    }
    .btn-bulat {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* KOLOM 2: Papan Tulis (Whiteboard) */
    .panel-papan {
      background: white; border-radius: 15px; display: flex; flex-direction: column;
      overflow: hidden; border: 1px solid #334155;
    }
    .toolbar-papan {
      background: #f1f5f9; padding: 8px; border-bottom: 1px solid #e2e8f0;
      display: flex; gap: 8px; align-items: center;
    }
    #papan-canvas { flex: 1; cursor: crosshair; }

    /* KOLOM 3: Tugas & Chat */
    .panel-kanan {
      display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    }
    .blok-tugas {
      background: #1e293b; border-radius: 15px; padding: 15px;
      border: 1px solid #334155;
    }
    .blok-tugas textarea {
      width: 100%; background: #0f172a; border: 1px solid #475569;
      border-radius: 8px; color: white; padding: 10px; margin: 10px 0; resize: none;
    }
    .btn-aksi {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-weight: bold; cursor: pointer; background: #10b981; color: white;
    }
    .list-jawaban {
      margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px;
    }

    /* Responsif */
    @media (max-width: 1100px) {
      .kontainer-utama { grid-template-columns: 1fr; overflow-y: auto; }
      .panel-video, .panel-papan { height: 400px; }
    }
  </style>
</head>
<body>

  <div class="header-ruang">
    <div style="font-weight: 800; font-size: 18px; color: #60a5fa;">ZooMimanu <span style="color:white">Live</span></div>
    <div id="info-status">🟢 Mengajar: <span id="nama-guru-header">...</span></div>
    <button onclick="keluar()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Keluar</button>
  </div>

  <div class="kontainer-utama">
    
    <div class="panel-video">
      <div id="tampilan-video">
        <video id="video-lokal" autoplay muted playsinline></video>
      </div>
      <div class="kontrol-mini">
        <button class="btn-bulat" onclick="toggleCam()" style="background:#3b82f6;">📷</button>
        <button class="btn-bulat" onclick="toggleMic()" style="background:#3b82f6;">🎤</button>
      </div>
    </div>

    <div class="panel-papan">
      <div class="toolbar-papan">
        <input type="color" id="warna-papan" onchange="gantiWarna(this.value)">
        <button onclick="hapusPapan()" style="padding:5px 10px;">🗑️ Bersihkan</button>
        <span style="color:#64748b; font-size:12px; margin-left:auto;">Papan Tulis Interaktif</span>
      </div>
      <canvas id="papan-canvas"></canvas>
    </div>

    <div class="panel-kanan">
      <div class="blok-tugas">
        <h4 style="margin:0;">📝 Berikan Tugas</h4>
        <textarea id="teks-tugas" rows="4" placeholder="Tulis soal atau instruksi tugas..."></textarea>
        <button class="btn-aksi" onclick="postTugas()">Kirim ke Semua Siswa</button>
        
        <div class="list-jawaban">
          <h5 style="margin-bottom:8px;">Jawaban Siswa:</h5>
          <div id="container-jawaban" style="font-size:13px; color:#94a3b8; text-align:center;">
            Belum ada jawaban masuk.
          </div>
        </div>
      </div>

      <div class="blok-tugas" style="flex:1;">
        <h4 style="margin:0;">💬 Chat Kelas</h4>
        <div id="box-chat" style="height:150px; overflow-y:auto; margin:10px 0; background:rgba(0,0,0,0.2); border-radius:5px; padding:8px; font-size:12px;"></div>
        <div style="display:flex; gap:5px;">
          <input type="text" id="input-chat" style="flex:1; background:#0f172a; border:1px solid #475569; color:white; padding:5px; border-radius:4px;">
          <button onclick="kirimChat()">🚀</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Konfigurasi Awal
    const user = JSON.parse(localStorage.getItem('penggunaSaatIni'));
    document.getElementById('nama-guru-header').textContent = user ? user.namaGuru || user.nama : "Guru";

    // INTEGRASI VIDEO CALL (Langsung di Tab)
    let streamLokal;
    async function mulaiKamera() {
      try {
        streamLokal = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('video-lokal').srcObject = streamLokal;
      } catch (e) {
        console.error("Akses kamera ditolak", e);
      }
    }
    mulaiKamera();

    function toggleCam() {
      const v = streamLokal.getVideoTracks()[0];
      v.enabled = !v.enabled;
    }
    function toggleMic() {
      const a = streamLokal.getAudioTracks()[0];
      a.enabled = !a.enabled;
    }

    // INTEGRASI PAPAN TULIS
    const canvas = document.getElementById('papan-canvas');
    const ctx = canvas.getContext('2d');
    let menggambar = false;
    let warnaAktif = '#000000';

    function aturUkuranCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', aturUkuranCanvas);
    aturUkuranCanvas();

    canvas.addEventListener('mousedown', () => menggambar = true);
    canvas.addEventListener('mouseup', () => { menggambar = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
      if (!menggambar) return;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.strokeStyle = warnaAktif;
      
      const rect = canvas.getBoundingClientRect();
      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    function gantiWarna(w) { warnaAktif = w; }
    function hapusPapan() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // INTEGRASI TUGAS
    function postTugas() {
      const soal = document.getElementById('teks-tugas').value;
      if(!soal) return alert("Tulis soal dulu!");
      alert("Tugas berhasil dikirim ke layar siswa!");
      document.getElementById('teks-tugas').value = "";
    }

    function kirimChat() {
      const msg = document.getElementById('input-chat').value;
      if(!msg) return;
      const box = document.getElementById('box-chat');
      box.innerHTML += `<div><b>Anda:</b> ${msg}</div>`;
      document.getElementById('input-chat').value = "";
      box.scrollTop = box.scrollHeight;
    }

    function keluar() {
      if(confirm("Akhiri sesi kelas?")) {
        if(streamLokal) streamLokal.getTracks().forEach(t => t.stop());
        window.location.href = '/guru-dashboard.html';
      }
    }
  </script>
</body>
</html>
