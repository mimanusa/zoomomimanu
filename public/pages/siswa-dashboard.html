<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ZooMimanu">
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body { background: #F8FAFC; display: flex; flex-direction: column; min-height: 100vh; }
    .konten { max-width: 540px; margin: 0 auto; padding: 40px 20px; width: 100%; }

    .banner-hero {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      border-radius: 24px; padding: 32px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .avatar-siswa {
      width: 72px; height: 72px; flex-shrink: 0;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; box-shadow: 0 8px 24px rgba(108,60,225,0.4);
    }
    .banner-teks h2 { font-family: 'Sora', sans-serif; font-size: 22px; color: white; margin-bottom: 6px; }
    .badge-kelas {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(108,60,225,0.35); border: 1px solid rgba(108,60,225,0.5);
      color: #C4B5FD; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 800;
    }

    .kartu-state {
      background: white; border-radius: 20px; padding: 40px 28px;
      box-shadow: var(--bayangan); text-align: center;
    }
    .state-icon { font-size: 56px; margin-bottom: 16px; display: block; }
    .kartu-state h3 { font-family: 'Sora', sans-serif; font-size: 18px; color: var(--gelap); margin-bottom: 8px; }
    .kartu-state p { font-size: 14px; color: var(--abu); font-weight: 600; margin-bottom: 24px; }

    .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #6C3CE1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-masuk-besar {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      color: white; font-weight: 800; font-size: 16px;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 6px 20px rgba(108,60,225,0.35);
    }
    .btn-masuk-besar:hover { transform: translateY(-2px); opacity: 0.95; }

    .info-ruang-box {
      background: var(--abu-muda); border-radius: 12px; padding: 14px 18px;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .info-ruang-box .kode { font-family: monospace; font-size: 20px; font-weight: 900; color: var(--primary); }
    .info-ruang-box .label { font-size: 11px; color: var(--abu); font-weight: 700; }

    .btn-refresh { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 700; color: var(--abu); cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
    .btn-refresh:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
  <div class="header-app">
    <div class="logo">Zoo<span>Mimanu</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="info-header">Memuat...</span>
      <button class="btn btn-kecil btn-merah" onclick="keluar()">Keluar</button>
    </div>
  </div>

  <div class="konten">
    <div class="banner-hero">
      <div class="avatar-siswa">👤</div>
      <div class="banner-teks">
        <h2 id="nama-siswa">Selamat Datang!</h2>
        <div class="badge-kelas">Kelas <span id="kelas-siswa-info">—</span></div>
      </div>
    </div>

    <div id="state-mencari" class="kartu-state">
      <div class="spinner"></div>
      <h3>Mencari ruang kelas...</h3>
      <p>Menghubungkan ke server</p>
    </div>

    <div id="state-ditemukan" class="kartu-state" style="display:none;">
      <span class="state-icon">🏫</span>
      <h3>Ruang kelas siap!</h3>
      <div class="info-ruang-box">
        <div>
          <div class="label">Kode Ruang</div>
          <div class="kode" id="kode-ruang-display">—</div>
        </div>
        <div style="font-size:12px; color:var(--abu); font-weight:700;" id="nama-guru-display">—</div>
      </div>
      <button class="btn-masuk-besar" onclick="masukRuang()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Masuk ke Kelas
      </button>
    </div>

    <div id="state-kosong" class="kartu-state" style="display:none;">
      <span class="state-icon">⏳</span>
      <h3>Belum ada kelas aktif</h3>
      <p>Guru belum membuka ruang untuk <strong id="kelas-kosong-label">kelasmu</strong>. Halaman ini akan otomatis mengecek setiap 8 detik.</p>
      <button class="btn-refresh" onclick="cariRuang()">🔄 Cek Sekarang</button>
    </div>
  </div>

  <script>
    let penggunaSaatIni = null;
    let ruangDitemukan = null;
    let intervalCari = null;

    window.onload = function() {
      const data = localStorage.getItem('penggunaSaatIni');
      if (!data) return window.location.href = '/';
      penggunaSaatIni = JSON.parse(data);
      if (penggunaSaatIni.role !== 'siswa') return window.location.href = '/';

      document.getElementById('info-header').textContent = penggunaSaatIni.nama;
      document.getElementById('nama-siswa').textContent = 'Halo, ' + penggunaSaatIni.nama + '!';
      document.getElementById('kelas-siswa-info').textContent = penggunaSaatIni.kelas;
      document.getElementById('kelas-kosong-label').textContent = penggunaSaatIni.kelas;

      if (penggunaSaatIni.ruang) {
        tampilRuang(penggunaSaatIni.ruang);
      } else {
        cariRuang();
      }
    };

    async function cariRuang() {
      document.getElementById('state-mencari').style.display = 'block';
      document.getElementById('state-ditemukan').style.display = 'none';
      document.getElementById('state-kosong').style.display = 'none';
      try {
        const resp = await fetch('/api/ruang/aktif/' + encodeURIComponent(penggunaSaatIni.kelas));
        const hasil = await resp.json();
        const list = hasil.data || [];
        if (list.length > 0) {
          tampilRuang(list[0]);
          if (intervalCari) { clearInterval(intervalCari); intervalCari = null; }
        } else {
          document.getElementById('state-mencari').style.display = 'none';
          document.getElementById('state-kosong').style.display = 'block';
          if (!intervalCari) intervalCari = setInterval(cariRuang, 8000);
        }
      } catch(e) {
        document.getElementById('state-mencari').style.display = 'none';
        document.getElementById('state-kosong').style.display = 'block';
      }
    }

    function tampilRuang(ruang) {
      ruangDitemukan = ruang;
      document.getElementById('state-mencari').style.display = 'none';
      document.getElementById('state-kosong').style.display = 'none';
      document.getElementById('state-ditemukan').style.display = 'block';
      document.getElementById('kode-ruang-display').textContent = ruang.kode;
      document.getElementById('nama-guru-display').textContent = 'Guru: ' + (ruang.namaGuru || '—');
    }

    function masukRuang() {
      if (!ruangDitemukan) return;
      localStorage.setItem('ruangSaatIni', JSON.stringify(ruangDitemukan));
      window.location.href = '/ruang/' + ruangDitemukan.id;
    }

    function keluar() {
      if (intervalCari) clearInterval(intervalCari);
      localStorage.removeItem('penggunaSaatIni');
      localStorage.removeItem('ruangSaatIni');
      window.location.href = '/';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
  </script>
</body>
</html>
