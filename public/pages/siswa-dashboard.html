<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <style>
    .konten { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
    .banner-hero {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }
    .avatar-siswa {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(108,60,225,0.4);
      z-index: 1;
    }
    .banner-teks { z-index: 1; }
    .banner-teks h2 { font-family: 'Sora', sans-serif; font-size: 24px; color: white; margin-bottom: 4px; }
    .badge-kelas {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(108,60,225,0.35); border: 1px solid rgba(108,60,225,0.5);
      color: #C4B5FD; padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 800;
    }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-kartu { background: white; border-radius: 16px; padding: 20px; box-shadow: var(--bayangan); text-align: center; }
    .stat-angka { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--abu); font-weight: 700; }
    .section-kartu { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: var(--bayangan); }
    .section-kartu h3 { font-size: 16px; font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .kartu-ruang-tersedia {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--abu-muda); border: 2px solid transparent;
      border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
    }
    .kartu-ruang-tersedia:hover { border-color: var(--primary); background: var(--primary-light); }
    .kartu-ruang-tersedia .judul-ruang { font-size: 18px; font-weight: 900; color: var(--primary); }
    @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } .banner-hero { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>
  <div class="header-app">
    <div class="logo">Zoo<span>Mimanu</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="info-header">Memuat...</span>
      <button class="btn btn-kecil btn-merah" onclick="keluar()">Keluar</button>
    </div>
  </div>

  <div class="konten">
    <div class="banner-hero">
      <div class="avatar-siswa">👤</div>
      <div class="banner-teks">
        <h2 id="nama-siswa">Selamat Datang!</h2>
        <div class="badge-kelas">Kelas <span id="kelas-siswa-info">—</span></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-kartu"><div class="stat-angka" id="stat-ruang">0</div><div class="stat-label">Ruang Aktif</div></div>
      <div class="stat-kartu"><div class="stat-angka" id="stat-tugas">0</div><div class="stat-label">Tugas Masuk</div></div>
      <div class="stat-kartu"><div class="stat-angka" id="stat-selesai">0</div><div class="stat-label">Tugas Selesai</div></div>
    </div>

    <div class="section-kartu">
      <h3>Ruang Kelas Tersedia</h3>
      <div id="daftar-ruang-siswa">
        <div style="text-align:center; padding:20px; color:var(--abu);">Memuat ruang...</div>
      </div>
    </div>
  </div>

  <script>
    let penggunaSaatIni = JSON.parse(localStorage.getItem('penggunaSaatIni'));
    if (!penggunaSaatIni || penggunaSaatIni.role !== 'siswa') window.location.href = '/';

    document.getElementById('info-header').textContent = penggunaSaatIni.nama;
    document.getElementById('nama-siswa').textContent = `Halo, ${penggunaSaatIni.nama}!`;
    document.getElementById('kelas-siswa-info').textContent = penggunaSaatIni.kelas;

    async function muatRuang() {
      try {
        const resp = await fetch(`/api/ruang/aktif/${penggunaSaatIni.kelas}`);
        const hasil = await resp.json();
        const container = document.getElementById('daftar-ruang-siswa');
        const ruangList = hasil.data || [];
        document.getElementById('stat-ruang').textContent = ruangList.length;

        if (ruangList.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:grey;">Belum ada ruang kelas aktif.</p>';
          return;
        }

        container.innerHTML = ruangList.map(r => `
          <div class="kartu-ruang-tersedia" onclick="masukRuang('${r.id}', '${r.kode}', '${r.judul}', '${r.namaGuru}')">
            <div>
              <div class="judul-ruang">${r.judul}</div>
              <div style="font-size:12px;color:grey;">Guru: ${r.namaGuru}</div>
            </div>
            <button class="btn btn-utama btn-kecil">Masuk</button>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    function masukRuang(id, kode, judul, namaGuru) {
      localStorage.setItem('ruangSaatIni', JSON.stringify({ id, kode, judul, namaGuru }));
      window.location.href = `/ruang/${id}`;
    }

    function keluar() {
      localStorage.removeItem('penggunaSaatIni');
      window.location.href = '/';
    }

    muatRuang();
    setInterval(muatRuang, 10000);
  </script>
</body>
</html>
