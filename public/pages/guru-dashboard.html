<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru — ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <style>
    .layout-pusat {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0F172A;
      padding: 20px;
    }
    .card-utama {
      background: #1E293B;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      max-width: 450px;
      width: 100%;
      border: 1px solid #334155;
    }
    .icon-box {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6366F1, #22C55E);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
    }
    h2 { color: white; margin-bottom: 8px; font-family: sans-serif; }
    p { color: #94A3B8; margin-bottom: 30px; line-height: 1.5; }
    .btn-masuk-langsung {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #6366F1;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-masuk-langsung:hover { background: #4F46E5; transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="layout-pusat">
    <div class="card-utama">
      <div class="icon-box">👨‍🏫</div>
      <h2 id="salam">Selamat Datang</h2>
      <p>Akses langsung ke ruang kelas Anda tanpa perlu membuat ulang ruangan. Klik tombol di bawah untuk memulai.</p>
      <button class="btn-masuk-langsung" onclick="aksesKelas()">🚀 Masuk ke Kelas</button>
    </div>
  </div>

  <script>
    const data = localStorage.getItem('penggunaSaatIni');
    if (data) {
      const user = JSON.parse(data);
      document.getElementById('salam').textContent = `Halo, ${user.nama || 'Guru'}!`;
    }

    function aksesKelas() {
      // Langsung tentukan ruang utama
      const infoRuang = { id: "KELAS-UTAMA", status: "aktif" };
      localStorage.setItem('ruangAktif', JSON.stringify(infoRuang));
      window.location.href = '/ruang-kelas.html';
    }
  </script>
</body>
</html>
