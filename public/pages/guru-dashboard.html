<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru — ZooMimanu</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <style>
    .layout-dashboard {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0F172A;
      padding: 20px;
    }
    .card-pusat {
      background: linear-gradient(145deg, #1E293B, #0F172A);
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .avatar-guru {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 30px rgba(108,60,225,0.4);
    }
    h2 { color: white; margin-bottom: 10px; font-family: 'Sora', sans-serif; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 30px; line-height: 1.6; }
    .btn-masuk {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #6C3CE1, #00C896);
      color: white;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-masuk:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); opacity: 0.9; }
  </style>
</head>
<body>

  <div class="layout-dashboard">
    <div class="card-pusat">
      <div class="avatar-guru">👩‍🏫</div>
      <h2 id="salam-guru">Halo, Guru!</h2>
      <p>Ruang kelas sudah siap. Klik tombol di bawah untuk mulai mengajar dan berinteraksi dengan siswa.</p>
      <button class="btn-masuk" onclick="langsungMasuk()">🚀 Mulai Masuk Kelas</button>
    </div>
  </div>

  <script>
    const dataUser = localStorage.getItem('penggunaSaatIni');
    if (dataUser) {
      const user = JSON.parse(dataUser);
      document.getElementById('salam-guru').textContent = `Halo, ${user.namaGuru || 'Guru'}!`;
    }

    function langsungMasuk() {
      // Menentukan kode ruang otomatis agar tidak perlu input lagi
      const ruangDefault = { kode: "KELAS-UTAMA", aktif: true };
      localStorage.setItem('ruangSaatIni', JSON.stringify(ruangDefault));
      window.location.href = '/ruang-kelas.html';
    }
  </script>
</body>
</html>
